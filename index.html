<html lang="ko">
<head>

<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Nanum+Gothic:wght@400;700;800&display=swap" />
<script src="https://cdn.tailwindcss.com"></script>

  tailwind.config = {

        colors: {
          ink: { 900:'#0B1220', 800:'#111827', 700:'#1F2937', 600:'#374151', 500:'#6B7280', 400:'#9CA3AF', 300:'#D1D5DB', 200:'#E5E7EB', 100:'#F3F4F6', 50:'#F9FAFB' },
          brand: { DEFAULT:'#1D1D1F', light:'#0066FF', soft:'#F5F5F7', hover:'#000000' },
          accent: { gold:'#B59157', green:'#10B981', amber:'#F59E0B', red:'#EF4444' },

<style>
  html, body { font-family: 'Pretendard Variable', Pretendard, system-ui, sans-serif; letter-spacing: -0.01em; }
  .tabular-nums { font-variant-numeric: tabular-nums; }
  .fade-in { animation: fadeIn 0.25s ease-out; }
  @keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }
  @keyframes slideInRight { from { transform:translateX(100%); opacity:0; } to { transform:translateX(0); opacity:1; } }

  /* ── 테마 시스템 (data-theme on <html>) ── */
  :root {
    --theme-sidebar-grad-v: linear-gradient(180deg, #1D1D1F 0%, #0A0A0A 100%);
    --theme-sidebar-grad:   linear-gradient(145deg, #000000 0%, #1D1D1F 55%, #3A3A3C 100%);
    --theme-ai-grad:        linear-gradient(135deg, #1D1D1F 0%, #3A3A3C 100%);
    --theme-primary:        #0066FF;
    --theme-primary-hover:  #0052CC;
    --theme-primary-soft:   #F0F7FF;
    --theme-bg-tint:        #FAFAFA;
  }
  html[data-theme="sunset"] {
    --theme-sidebar-grad-v: linear-gradient(180deg, #3D1E0C 0%, #1C0E05 100%);
    --theme-sidebar-grad:   linear-gradient(145deg, #1C1917 0%, #7C2D12 55%, #C2410C 100%);
    --theme-ai-grad:        linear-gradient(135deg, #3D1E0C 0%, #9A3412 100%);
    --theme-primary:        #F37321;
    --theme-primary-hover:  #DC5B0A;
    --theme-primary-soft:   #FFF7ED;
    --theme-bg-tint:        #FFFAF5;
  }
  html[data-theme="ocean"] {
    --theme-sidebar-grad-v: linear-gradient(180deg, #0A1A33 0%, #020817 100%);
    --theme-sidebar-grad:   linear-gradient(145deg, #050D1F 0%, #123466 55%, #1E4A8F 100%);
    --theme-ai-grad:        linear-gradient(135deg, #0A1A33 0%, #1E4A8F 100%);
    --theme-primary:        #0EA5E9;
    --theme-primary-hover:  #0284C7;
    --theme-primary-soft:   #F0F9FF;
    --theme-bg-tint:        #F5FAFF;
  }
  html[data-theme="forest"] {
    --theme-sidebar-grad-v: linear-gradient(180deg, #0F2920 0%, #051310 100%);
    --theme-sidebar-grad:   linear-gradient(145deg, #0A1F18 0%, #134632 55%, #1F6B4C 100%);
    --theme-ai-grad:        linear-gradient(135deg, #0F2920 0%, #1F6B4C 100%);
    --theme-primary:        #10B981;
    --theme-primary-hover:  #059669;
    --theme-primary-soft:   #F0FDF4;
    --theme-bg-tint:        #F5FCF8;
  }
  html[data-theme="royal"] {
    --theme-sidebar-grad-v: linear-gradient(180deg, #1E1B3D 0%, #0B0A1F 100%);
    --theme-sidebar-grad:   linear-gradient(145deg, #13102A 0%, #312E81 55%, #4F46E5 100%);
    --theme-ai-grad:        linear-gradient(135deg, #1E1B3D 0%, #4F46E5 100%);
    --theme-primary:        #8B5CF6;
    --theme-primary-hover:  #7C3AED;
    --theme-primary-soft:   #F5F3FF;
    --theme-bg-tint:        #FAF8FF;
  }

  /* 테마 적용 대상 — 전역 */
  .admin-sidebar { background: var(--theme-sidebar-grad-v) !important; }
  .lg-left       { background: var(--theme-sidebar-grad) !important; }
  .ai-box        { background: var(--theme-ai-grad) !important; }
  body, #adminMain { background: var(--theme-bg-tint) !important; }

  /* 포커스 컬러 */
  input:focus, select:focus, textarea:focus { border-color: var(--theme-primary) !important; }
  .lg-inp:focus { border-color: var(--theme-primary) !important; box-shadow: 0 0 0 3px color-mix(in srgb, var(--theme-primary) 10%, transparent) !important; }

  /* 주요 브랜드 요소 (Tailwind .bg-brand, .text-brand 등) */
  .bg-brand, button.bg-brand { background-color: var(--theme-primary) !important; }
  .hover\:bg-brand-hover:hover, .bg-brand:hover { background-color: var(--theme-primary-hover) !important; }
  .text-brand { color: var(--theme-primary) !important; }
  .bg-brand-soft { background-color: var(--theme-primary-soft) !important; }
  .border-brand, .focus\:border-brand:focus { border-color: var(--theme-primary) !important; }

  /* KPI 강조 숫자 (c-purple 카드만) */
  .kpi-card.c-purple .kpi-val { color: var(--theme-primary) !important; }
  .kpi-card.c-purple::after { background: color-mix(in srgb, var(--theme-primary) 10%, transparent) !important; }

  /* 로그인 버튼 */
  .lg-btn {
    background: linear-gradient(135deg, var(--theme-primary-hover) 0%, var(--theme-primary) 100%) !important;
    box-shadow: 0 4px 14px color-mix(in srgb, var(--theme-primary) 35%, transparent) !important;
  }

  /* Primary CTA 버튼 (data-primary 속성으로 마킹 가능) */
  button[data-primary] { background: var(--theme-primary) !important; color:#fff; }
  button[data-primary]:hover { background: var(--theme-primary-hover) !important; }

  /* 환영 팝업 애니메이션 */
  @keyframes welcomePop {
    0%   { opacity:0; transform: scale(0.7) translateY(20px); }
    60%  { opacity:1; transform: scale(1.05) translateY(0); }
    100% { opacity:1; transform: scale(1) translateY(0); }
  }
  @keyframes welcomeSlide {
    0%   { opacity:0; transform: translateX(-50%) translateY(-20px); }
    100% { opacity:1; transform: translateX(-50%) translateY(0); }
  }
  @keyframes welcomeFade { from { opacity:1; } to { opacity:0; } }
  @keyframes checkDraw {
    0% { stroke-dashoffset: 50; }
    100% { stroke-dashoffset: 0; }
  }

  /* 퇴직자 관리 테이블 반응형 컬럼 숨김 + 크기 축소 */
  @media (max-width: 1600px) {
    .resig-col-hide-lg { display: none; }
  }
  @media (max-width: 1400px) {
    .resig-col-hide-md { display: none; }
    .resig-table td, .resig-table th { padding:9px 8px !important; font-size:12px !important; }
  }
  @media (max-width: 1200px) {
    .resig-col-hide-sm { display: none; }
    .resig-table td, .resig-table th { padding:8px 6px !important; font-size:11.5px !important; }
  }
  @media (max-width: 1024px) {
    .resig-table td, .resig-table th { padding:7px 5px !important; font-size:11px !important; }
    .resp-page { padding:16px 14px !important; }
  }
  /* 확대/모바일 대응 — 심한 확대 시 (CSS 뷰포트 < 900px) */
  @media (max-width: 900px) {
    .resig-table td, .resig-table th { padding:6px 4px !important; font-size:10.5px !important; }
    .resp-page { padding:12px 10px !important; }
  }
  @media (max-width: 700px) {
    .resig-table td, .resig-table th { padding:5px 3px !important; font-size:10px !important; }
    .resig-table select { font-size:10px !important; height:24px !important; max-width:80px !important; }
    .resp-page { padding:8px 6px !important; }
  }

  /* 전역 반응형 스케일 — 좁은 화면에서 비율적으로 축소 */
  @media (max-width: 1400px) {
    .db-page { padding:16px 18px !important; }
    .kpi-card { padding:10px 12px !important; }
    .kpi-card .kpi-val { font-size:20px !important; }
  }
  @media (max-width: 900px) {
    .db-page { padding:12px 10px !important; }
    .kpi-card { padding:8px 10px !important; }
    .kpi-card .kpi-val { font-size:17px !important; }
    .kpi-card .kpi-lbl { font-size:9.5px !important; }
    .ai-box { padding:10px 12px !important; }
    .alert-card { padding:8px 10px !important; }
    .chart-card { padding:10px 12px !important; }
    .chart-card h3 { font-size:11px !important; }
  }
  @media (max-width: 700px) {
    .db-header h1 { font-size:15px !important; }
    .kpi-card { padding:7px 8px !important; }
    .kpi-card .kpi-val { font-size:15px !important; }
    .kpi-card .kpi-unit { font-size:10px !important; }
  }
  /* 필터 바가 매우 좁은 화면에서 깨지지 않도록 */
  @media (max-width: 900px) {
    select, input[type="text"], input:not([type]) { font-size:12px !important; height:32px !important; }
  }

  /* ── 반응형 레이아웃 ── */
  .admin-sidebar { width:240px; background:#1D1D1F; position:fixed; top:44px; left:0; height:calc(100vh - 44px); overflow-y:auto; display:flex; flex-direction:column; z-index:150; transition:transform .25s ease; }
  .admin-main { flex:1; margin-left:240px; min-height:calc(100vh - 44px); background:#F9FAFB; }
  .sidebar-backdrop { display:none; position:fixed; top:44px; left:0; right:0; bottom:0; background:rgba(0,0,0,.4); z-index:140; }
  .mobile-menu-btn { display:none; }
  .topbar-label { font-size:13px; color:#6B7280; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; min-width:0; flex:1; }
  .table-scroll { overflow-x:auto; -webkit-overflow-scrolling:touch; }

  @media (max-width: 900px) {
    .admin-sidebar { transform:translateX(-100%); }
    .admin-sidebar.open { transform:translateX(0); box-shadow:8px 0 32px rgba(0,0,0,.2); }
    .admin-main { margin-left:0; }
    .sidebar-backdrop.open { display:block; }
    .mobile-menu-btn { display:inline-flex !important; }
    .comment-panel-responsive { width:100vw !important; max-width:100vw !important; }
  }

  @media (max-width: 640px) {
    .kpi-grid { grid-template-columns:repeat(2,1fr) !important; }
    .alert-grid { grid-template-columns:repeat(2,1fr) !important; gap:8px !important; }
    .chart-grid { grid-template-columns:1fr !important; }
    .chart-card.wide { grid-column:span 1 !important; }
    .db-header h1 { font-size:17px !important; }
    .resp-page { padding:14px 12px !important; }
    .resp-card { padding:14px !important; }
  }
</style>
</head>

<script src="config.js"></script>

<script>
// ============================================================
// 클라이언트 초기화
// ============================================================
const sb     = createSupabaseClient();                                             // retirement 스키마 (anon)
const sbAdmin = SUPABASE_CONFIG.serviceKey                                         // retirement 스키마 (service role — RLS 우회)
  ? supabase.createClient(SUPABASE_CONFIG.url, SUPABASE_CONFIG.serviceKey, {
      db: { schema: SUPABASE_CONFIG.schema },
      auth: { persistSession: false, autoRefreshToken: false, detectSessionInUrl: false }
    })
  : sb;
const sbGeo  = sb ? supabase.createClient(SUPABASE_CONFIG.url, SUPABASE_CONFIG.anonKey) : null; // public 스키마 (거현량)

const root = document.getElementById('root');

// ============================================================
// 앱 상태
// ============================================================
// 테마 즉시 적용 (페이지 플래시 방지)
(function(){
  try { const t=localStorage.getItem('dw-theme')||'mono'; document.documentElement.setAttribute('data-theme', t); } catch(e){}
})();

const THEMES = [
  { key:'mono',   label:'모노크롬',   dot:'#1D1D1F' },
  { key:'sunset', label:'선셋 오렌지', dot:'#F37321' },
  { key:'ocean',  label:'오션 블루',   dot:'#0EA5E9' },
  { key:'forest', label:'포레스트',    dot:'#10B981' },
  { key:'royal',  label:'로얄 퍼플',   dot:'#8B5CF6' },
];

// 환영 팝업 (체크 + 이름)
function showWelcomePopup(name, role) {
  document.getElementById('welcomePopup')?.remove();
  const displayName = name || '관리자';
  const roleText = role==='hr_admin' ? 'HR 관리자' : role==='hr_viewer' ? 'HR 뷰어' : role==='company_admin' ? '회사 관리자' : role==='uploader_admin' ? '업로더' : '';
  const el = document.createElement('div');
  el.id = 'welcomePopup';
  el.style.cssText = `position:fixed;top:70px;left:50%;transform:translateX(-50%);background:#fff;border-radius:14px;padding:16px 26px;box-shadow:0 12px 40px rgba(0,0,0,.14);z-index:10000;text-align:left;animation:welcomeSlide .35s cubic-bezier(.34,1.56,.64,1);min-width:300px;max-width:calc(100vw - 32px);display:flex;align-items:center;gap:14px;`;
  el.innerHTML = `
    <div style="width:44px;height:44px;border-radius:50%;background:color-mix(in srgb, var(--theme-primary) 15%, transparent);display:flex;align-items:center;justify-content:center;flex-shrink:0;">
      <svg width="26" height="26" viewBox="0 0 52 52" fill="none">
        <circle cx="26" cy="26" r="24" stroke="var(--theme-primary)" stroke-width="2.5" fill="color-mix(in srgb, var(--theme-primary) 10%, transparent)"/>
        <path d="M14 27 L23 35 L38 18" stroke="var(--theme-primary)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none" stroke-dasharray="50" style="animation:checkDraw .5s ease-out .15s forwards;stroke-dashoffset:50;"/>
      </svg>
    </div>
    <div style="flex:1;min-width:0;">
      <div style="font-size:14px;font-weight:700;color:#1D1D1F;line-height:1.3;">어서오세요! <strong>${esc(displayName)}</strong>님 👋</div>
      ${roleText ? `<div style="margin-top:3px;display:inline-block;padding:2px 8px;background:color-mix(in srgb, var(--theme-primary) 12%, transparent);color:var(--theme-primary);border-radius:999px;font-size:10.5px;font-weight:700;">${esc(roleText)}</div>` : ''}
    </div>`;
  document.body.appendChild(el);
  setTimeout(()=>{
    el.style.transition = 'opacity .3s, transform .3s';
    el.style.opacity = '0';
    el.style.transform = 'translateX(-50%) translateY(-10px)';
    setTimeout(()=>el.remove(), 300);
  }, 2200);
}

function setTheme(key) {
  document.documentElement.setAttribute('data-theme', key);
  try { localStorage.setItem('dw-theme', key); } catch(e){}
  document.getElementById('themeDropdown')?.remove();
  showToast(`테마 변경: ${THEMES.find(t=>t.key===key)?.label||key}`);
}

function toggleThemeDropdown() {
  const ex = document.getElementById('themeDropdown');
  if(ex){ ex.remove(); return; }
  const btn = document.getElementById('themeBtn');
  if(!btn) return;
  const rect = btn.getBoundingClientRect();
  const current = localStorage.getItem('dw-theme') || 'mono';
  const dd = document.createElement('div');
  dd.id = 'themeDropdown';
  // 사이드바 안 버튼 → 우측 상단 방향으로 띄움
  const onSidebar = rect.left < 260;
  const top = onSidebar ? (rect.top - 10 - 240) : (rect.bottom + 4);
  const left = onSidebar ? (rect.left) : '';
  const right = onSidebar ? '' : Math.max(10, window.innerWidth - rect.right);
  dd.style.cssText = `position:fixed;top:${top}px;${onSidebar?`left:${left}px`:`right:${right}px`};width:210px;max-width:calc(100vw - 20px);background:#fff;border:1px solid #E5E7EB;border-radius:12px;box-shadow:0 12px 32px rgba(0,0,0,.2);z-index:300;overflow:hidden;`;
  dd.innerHTML = `

(async function init() {
  root.innerHTML = `<div class="min-h-screen flex items-center justify-center"><div class="w-8 h-8 rounded-full border-2 border-ink-200 border-t-brand animate-spin"></div></div>`;

  if (!sb) { renderLogin(); return; }

  // 강제 로그아웃 (?signout=1 또는 ?logout=1)
  const qs = new URLSearchParams(window.location.search);
  if (qs.has('signout') || qs.has('logout')) {
    try { await sb.auth.signOut(); } catch(e){}
    try { clearEmpIdentity(); } catch(e){}
    try {
      Object.keys(localStorage).filter(k => k.startsWith('sb-') || k.startsWith('supabase')).forEach(k => localStorage.removeItem(k));
    } catch(e){}
    window.history.replaceState({}, '', window.location.pathname);
    renderLogin();
    return;
  }

  // 관리자 세션 체크
  const { data: { session } } = await sb.auth.getSession();
  if (session) {
    adminUser = session.user;
    await loadAdminRoles();
    if (adminRoles.length > 0) { appMode = 'admin'; renderAdminApp(); return; }
  }

  // 직원 세션 체크
  const emp = getEmpIdentity();
  if (emp) { appMode = 'employee'; routeEmployee(); return; }

  renderLogin();
})();

function getEmpIdentity() {
  try {
    const d = JSON.parse(sessionStorage.getItem('emp_identity') || 'null');
    if (!d) return null;
    if (Date.now() - d.ts > 30 * 60 * 1000) { sessionStorage.removeItem('emp_identity'); return null; }
    return d;
  } catch { return null; }
}
function setEmpIdentity(employee_id, name) {
  sessionStorage.setItem('emp_identity', JSON.stringify({ employee_id, name, ts: Date.now() }));
}
function clearEmpIdentity() { sessionStorage.removeItem('emp_identity'); }

async function loadAdminRoles() {
  const { data } = await sbAdmin.from('user_roles').select('role_name').eq('user_id', adminUser.id);
  adminRoles = (data || []).map(r => r.role_name);
}

async function logout() {
  await sb.auth.signOut();
  adminUser = null; adminRoles = []; appMode = null;
  clearEmpIdentity();
  renderLogin();
}

function bindSmartLogin() {
  const field1   = document.getElementById('field1');
  const field2   = document.getElementById('field2');
  const f2Label  = document.getElementById('f2Label');
  const f2Hint   = document.getElementById('f2Hint');
  const badge    = document.getElementById('dwBadge');

  // 숫자만 → 직원, 그 외 → 관리자
  function isAdmin() { return field1.value.trim() !== '' && !/^\d+$/.test(field1.value.trim()); }

  function updateMode() {
    if (isAdmin()) {
      f2Label.textContent = '비밀번호';
      field2.type = 'password';
      field2.placeholder = '비밀번호를 입력해 주세요.';
      f2Hint.textContent = '관리자(HR 담당자) 계정으로 로그인합니다.';
      badge.innerHTML = '<span class="dot"></span>관리자 로그인';
      badge.className = 'lg-badge admin';
    } else {
      f2Label.textContent = '이름';
      field2.type = 'text';
      field2.placeholder = '홍길동';
      f2Hint.textContent = '직원명부에 등록된 이름을 입력해 주세요.';
      badge.innerHTML = '<span class="dot"></span>직원 로그인';
      badge.className = 'lg-badge emp';
    }
  }

  field1.addEventListener('input', updateMode);

  document.getElementById('smartLoginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const err = document.getElementById('loginErr');
    const btn = document.getElementById('loginBtn');
    err.classList.remove('on');
    btn.disabled = true; btn.textContent = '확인 중...';

    const v1 = field1.value.trim();
    const v2 = field2.value.trim();

    try {
      if (isAdmin()) {
        // 관리자: 아이디에 @ 없으면 @daewoong.co.kr 자동 보완
        const email = v1.includes('@') ? v1 : v1 + '@daewoong.co.kr';
        const { data, error } = await sb.auth.signInWithPassword({ email, password: v2 });
        if (error) throw new Error('아이디 또는 비밀번호가 올바르지 않습니다.');
        adminUser = data.user;
        await loadAdminRoles();
        if (adminRoles.length === 0) {
          await sb.auth.signOut();
          throw new Error('로그인은 성공했지만 접근 권한이 없습니다. HR 관리자에게 문의하세요.');
        }
        appMode = 'admin';
        renderAdminApp();
        setTimeout(()=>showWelcomePopup((adminUser.email||'').split('@')[0], adminRoles[0]), 200);
      } else {
        // 직원: 사번 + 이름 RPC
        const { data, error } = await sb.rpc('check_employee_identity', {
          p_employee_id: v1,
          p_name: v2,
        });
        if (error) throw error;
        if (!data) throw new Error('사번과 이름이 일치하지 않습니다.');
        setEmpIdentity(v1, v2);
        appMode = 'employee';
        renderPortal();
      }
    } catch (e2) {
      document.getElementById('loginErr').textContent = e2.message || '오류가 발생했습니다. 잠시 후 다시 시도해 주세요.';
      document.getElementById('loginErr').classList.add('on');
    } finally {
      btn.disabled = false; btn.textContent = '로그인';
    }
  });
}

async function cancelMyResignation(id) {
  const reason = prompt('취소 사유를 입력해 주세요 (선택사항):');
  if (reason === null) return;
  if (!confirm('정말로 퇴직 접수를 취소하시겠습니까?\n취소 후에도 재접수가 가능합니다.')) return;
  const identity = getEmpIdentity();
  const { error } = await sbAdmin.from('resignation_requests').update({
    is_cancelled: true,
    cancelled_at: new Date().toISOString(),
    cancelled_by: (identity?.name||'본인') + ' (본인 취소)',
    cancel_reason: reason || null
  }).eq('id', id);
  if (error) { alert('처리 중 오류가 발생했습니다: ' + error.message); return; }
  alert('퇴직 취소가 처리되었습니다.\n인사팀에서 확인 후 별도 안내드릴 예정입니다.');
  renderPortal();
}

async function loadConnBadge() {
  try {
    const { count } = await sbGeo.from('position_connections')
      .select('*', { count: 'exact', head: true })
      .eq('status', 'pending');
    const badge = document.getElementById('conn-noti-badge');
    if (badge) {
      if (count > 0) {
        badge.textContent = count;
        badge.style.display = 'inline-flex';
      } else {
        badge.style.display = 'none';
      }
    }
  } catch(e) {}
}

function setAdminView(k) {
  if(!_navLock){ _navStack.splice(_navPos+1); _navStack.push(k); _navPos=_navStack.length-1; }
  adminView=k; renderAdminApp();
  if(window.innerWidth<=900){ closeSidebar(); }

function navBack() {

function navForward() {

}

function generateInsights(list, Y, M) {
  const insights = [];
  const thisMonth = list.filter(r => { if (!r.resignation_date) return false; const d = new Date(r.resignation_date); return d.getFullYear()===Y && d.getMonth()===M; }).length;
  const lastMonth = list.filter(r => { if (!r.resignation_date) return false; const d = new Date(r.resignation_date); const lm = new Date(Y, M-1, 1); return d.getFullYear()===lm.getFullYear() && d.getMonth()===lm.getMonth(); }).length;
  const d5 = list.filter(r => r.is_d5_warning).length;
  const incomplete = list.filter(r => !r.completion_status).length;
  const tenures = list.map(r => r.tenure_months).filter(v => v != null);
  const avgTenure = tenures.length ? Math.round(tenures.reduce((a,b)=>a+b,0)/tenures.length) : 0;
  const shortTenure = tenures.filter(t => t < 24).length;
  const divMap = new Map(); list.forEach(r => { const k = r.division||'미지정'; divMap.set(k,(divMap.get(k)||0)+1); });
  const topDiv = Array.from(divMap.entries()).sort((a,b)=>b[1]-a[1])[0];

  if (thisMonth > 0 && lastMonth > 0) {
    const chg = Math.round((thisMonth - lastMonth) / lastMonth * 100);
    if (chg > 20) insights.push({ level:'warn', icon:'📈', text:`이번 달 퇴직자(${thisMonth}명)가 전월 대비 ${chg}% 급증했습니다. 주요 원인 파악이 필요합니다.` });
    else if (chg < -20) insights.push({ level:'good', icon:'📉', text:`이번 달 퇴직자(${thisMonth}명)가 전월 대비 ${Math.abs(chg)}% 감소했습니다. 안정적인 흐름입니다.` });
    else insights.push({ level:'info', icon:'📊', text:`이번 달 퇴직자는 ${thisMonth}명으로 전월(${lastMonth}명) 대비 유사한 수준입니다.` });
  } else if (thisMonth > 0) {
    insights.push({ level:'info', icon:'📊', text:`이번 달 ${thisMonth}명의 퇴직이 접수되었습니다.` });
  }

  if (d5 > 0) insights.push({ level:'urgent', icon:'🚨', text:`D-5 경고 ${d5}건이 있습니다 — 5일 이내 처리 필요 업무를 즉시 확인하세요.` });
  if (incomplete > 3) insights.push({ level:'warn', icon:'⚠️', text:`미완료 처리 건수가 ${incomplete}건입니다. 인사 처리 지연이 발생할 수 있습니다.` });

  if (topDiv && topDiv[1] > 0) {
    const pct = Math.round(topDiv[1] / list.length * 100);
    insights.push({ level:'info', icon:'🏢', text:`${topDiv[0]}이 전체 퇴직자의 ${pct}%(${topDiv[1]}명)로 가장 높습니다. 해당 본부의 retention 전략 점검을 권장합니다.` });
  }

  if (avgTenure > 0 && avgTenure < 24) insights.push({ level:'warn', icon:'⏱️', text:`평균 재직기간이 ${(avgTenure/12).toFixed(1)}년(${avgTenure}개월)로 짧습니다. 온보딩·조기 이탈 방지 프로그램 검토가 필요합니다.` });
  else if (avgTenure >= 60) insights.push({ level:'good', icon:'✅', text:`평균 재직기간 ${(avgTenure/12).toFixed(1)}년(${avgTenure}개월)으로 장기 근속 비율이 높은 편입니다.` });

  if (shortTenure > 0 && tenures.length > 0 && shortTenure / tenures.length > 0.3) {
    insights.push({ level:'warn', icon:'🔍', text:`2년 미만 단기 퇴직자가 ${shortTenure}명(${Math.round(shortTenure/tenures.length*100)}%)으로 높습니다. 채용 프로세스 및 직무 적합도 검토를 권장합니다.` });
  }

  if (insights.length === 0) insights.push({ level:'good', icon:'✅', text:'현재 특이 사항이 없습니다. 전반적으로 안정적인 인사 지표를 유지하고 있습니다.' });
  return insights;
}

// 코멘트 파싱 — 배열 형식, 구형식(flag JSON / 순수 텍스트) 마이그레이션 지원
function parseComments(raw) {
  if(!raw) return [];
  try {
    const o = JSON.parse(raw);
    if(Array.isArray(o)) return o;
    if(o && typeof o === 'object' && o.n) return [{a:'admin',t:'',m:o.n}];
  } catch(e) {}
  if(typeof raw === 'string' && raw.trim()) return [{a:'admin',t:'',m:raw.trim()}];
  return [];
}
function serializeComments(arr) { return arr.length ? JSON.stringify(arr) : null; }
function fmtCommentTime(iso) {
  if(!iso) return '';
  try {
    const d=new Date(iso), now=new Date(), diff=Math.floor((now-d)/1000);
    if(diff<60) return '방금';
    if(diff<3600) return Math.floor(diff/60)+'분 전';
    if(diff<86400) return Math.floor(diff/3600)+'시간 전';
    return d.toLocaleDateString('ko',{month:'short',day:'numeric'});
  } catch(e){ return ''; }
}
function authorInitial(a) { return ((a||'?')[0]).toUpperCase(); }

// @멘션 헬퍼
let _mentionUsers = null;
async function getMentionUsers() {
  if (_mentionUsers) return _mentionUsers;
  try {
    const { data } = await sbAdmin.auth.admin.listUsers({ perPage: 200 });
    _mentionUsers = (data?.users||[]).filter(u=>u.email).map(u=>({ email:u.email, label:u.email.split('@')[0] }));
  } catch(e) { _mentionUsers = []; }
  return _mentionUsers||[];
}
function renderMentionText(text) {
  if(!text) return '';
  return esc(text).replace(/@([A-Za-z0-9._+%\-]+)/g,'<span style="background:#F0FDFA;color:#0D9488;border-radius:3px;padding:0 3px;font-weight:600;">@$1</span>');
}
function setupMentionListener(id) {
  const ta = document.getElementById(`comment-input-${id}`);
  if(!ta) return;
  ta.addEventListener('input', async function() {
    const v = this.value, caret = this.selectionStart;
    const before = v.slice(0, caret);
    const m = before.match(/@([A-Za-z0-9._+%\-]*)$/);
    document.getElementById('mention-dropdown')?.remove();
    if(!m) return;
    const q = m[1].toLowerCase();
    const users = await getMentionUsers();
    const matches = q ? users.filter(u=>u.label.toLowerCase().includes(q)||u.email.toLowerCase().includes(q)) : users;
    if(!matches.length) return;
    const dd = document.createElement('div');
    dd.id = 'mention-dropdown';
    const rect = ta.getBoundingClientRect();
    dd.style.cssText = `position:fixed;background:#fff;border:1px solid #E5E7EB;border-radius:10px;box-shadow:0 8px 24px rgba(0,0,0,.12);z-index:10000;min-width:220px;max-height:200px;overflow-y:auto;`;
    dd.style.left = rect.left + 'px';
    dd.style.top = (rect.top - Math.min(matches.length,5)*40 - 8) + 'px';
    matches.slice(0,8).forEach(u=>{
      const item = document.createElement('div');
      item.style.cssText = 'padding:9px 14px;cursor:pointer;display:flex;align-items:center;gap:10px;font-size:13px;';
      item.innerHTML = `<span style="width:26px;height:26px;border-radius:50%;background:#0D9488;color:#fff;font-size:11px;font-weight:700;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;">${u.label[0].toUpperCase()}</span><span style="color:#374151;font-weight:600;">${u.label}</span><span style="color:#9CA3AF;font-size:11px;margin-left:auto;">${u.email}</span>`;
      item.onmouseenter = ()=>item.style.background='#F0FDFA';
      item.onmouseleave = ()=>item.style.background='';
      item.onmousedown = (e)=>{
        e.preventDefault();
        const cur = ta.value, cs = ta.selectionStart;
        const bef = cur.slice(0, cs), aft = cur.slice(cs);
        const newBef = bef.replace(/@([A-Za-z0-9._+%\-]*)$/, '@'+u.email+' ');
        ta.value = newBef + aft;
        ta.selectionStart = ta.selectionEnd = newBef.length;
        ta.focus();
        dd.remove();
      };
      dd.appendChild(item);
    });
    document.body.appendChild(dd);
    const hideDd = ()=>{ dd.remove(); document.removeEventListener('click',hideDd); };
    setTimeout(()=>document.addEventListener('click',hideDd), 0);
  });
}

// 알림 시스템
function extractMentions(text) {
  if(!text) return [];
  const m = text.match(/@([A-Za-z0-9._+%\-]+@[A-Za-z0-9.\-]+\.[A-Za-z]{2,})/g) || [];
  return [...new Set(m.map(x=>x.slice(1)))];
}
async function createMentionNotifications(resigId, row, msg) {
  const mentions = extractMentions(msg);
  if(!mentions.length) return;
  const users = await getMentionUsers();
  const validEmails = new Set(users.map(u=>u.email));
  const rows = mentions
    .filter(e => validEmails.has(e) && e !== adminUser?.email)
    .map(e => ({

async function updateResigType(id, type, ev) {
  const val = type || null;
  const sel = ev?.target || document.querySelector(`select[onchange*="updateResigType('${id}'"]`);
  if(sel){ sel.style.transition='background .2s'; sel.style.background='#F5F5F7'; sel.disabled=true; }

  // .select() 로 실제 업데이트된 row 회수
  const { data, error } = await sbAdmin
    .from('resignation_requests')
    .update({ resignation_type: val })
    .eq('id', id)
    .select('id,resignation_type');

  if(sel) sel.disabled=false;

  if(error){
    if(sel){ sel.style.background='#FEE2E2'; sel.style.color='#991B1B'; }
    alert('저장 실패: ' + error.message + '\n\n컬럼/권한 확인 필요.');

  }
  if(!data || data.length === 0){
    if(sel){ sel.style.background='#FEE2E2'; sel.style.color='#991B1B'; }

    return;
  }

  console.log('[updateResigType] 저장 성공:', data[0]);
  const row = adminRows.find(r=>r.id===id);
  if(row) row.resignation_type = data[0].resignation_type;
  if(sel){
    sel.style.background = val ? ((RESIG_TYPE_COLORS[val]||'#F3F4F6')+'1A') : '#fff';
    sel.style.color = val ? (RESIG_TYPE_COLORS[val]||'#374151') : '#9CA3AF';
    sel.style.fontWeight = val ? '600' : '400';
    sel.style.borderColor = val ? 'transparent' : '#E5E7EB';

}

async function addComment(id) {
  const inp = document.getElementById(`comment-input-${id}`);
  if(!inp) return;
  const msg = inp.value.trim();
  if(!msg) return;
  const row = adminRows.find(r=>r.id===id);
  if(!row) return;
  const comments = parseComments(row.note);
  comments.push({ a: adminUser?.email || 'admin', t: new Date().toISOString(), m: msg });
  const newNote = serializeComments(comments);
  inp.value = '';
  row.note = newNote;
  await sbAdmin.from('resignation_requests').update({ note: newNote }).eq('id', id);
  createMentionNotifications(id, row, msg).catch(()=>{});
  const panel = document.getElementById('comment-panel');
  if(panel?._renderPanel) panel._renderPanel();
  if(typeof renderResigBody === 'function') renderResigBody();
}

async function deleteComment(id, idx) {
  if(!confirm('이 코멘트를 삭제하시겠습니까?')) return;
  const row = adminRows.find(r=>r.id===id);
  if(!row) return;
  const comments = parseComments(row.note);
  comments.splice(idx, 1);
  const newNote = serializeComments(comments);
  row.note = newNote;
  await sbAdmin.from('resignation_requests').update({ note: newNote }).eq('id', id);
  const panel = document.getElementById('comment-panel');
  if(panel?._renderPanel) panel._renderPanel();
  renderResigBody();
}
function chkBtn(id,field,on){ return `<button onclick="toggleTask('${id}','${field}',${on})" class="w-5 h-5 rounded border transition inline-flex items-center justify-center ${on?'bg-brand border-brand text-white':'bg-white border-ink-300 text-transparent hover:border-ink-400'}"><svg class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3"><path d="M5 13l4 4L19 7"/></svg></button>`; }
async function toggleTask(id, field, curr) {
  const newVal = !curr;
  const patch = { [field]: newVal };
  const now = new Date().toISOString();
  if(field==='account_deleted') patch.account_deleted_at=newVal?now:null;
  if(field==='resignation_letter_submitted') patch.resignation_letter_at=newVal?now:null;
  if(field==='sap_posted') patch.sap_posted_at=newVal?now:null;
  const { error } = await sbAdmin.from('resignation_admin_tasks').update(patch).eq('resignation_request_id',id);
  if(error){ alert('실패: '+error.message); return; }
  const idx = adminRows.findIndex(r=>r.id===id);
  if(idx>=0){
    adminRows[idx][field]=newVal;
    adminRows[idx].completion_status=adminRows[idx].account_deleted&&adminRows[idx].resignation_letter_submitted&&adminRows[idx].sap_posted;
    adminRows[idx].status_label=adminRows[idx].completion_status?'완료':'미완료';
  }
  renderResigBody();
}
// 거현량 연계 토글 — 체크하면 open_positions에 공석 활성화
async function toggleGeoLink(id) {
  const row = adminRows.find(r=>r.id===id);
  if(!row) return;
  const btn = document.getElementById(`geo-link-${id}`);
  if(btn){ btn.disabled = true; btn.style.opacity = 0.6; }

  try {
    if(row.geo_linked && row.geo_open_position_id){
      // 해제: is_active = false
      const { error } = await sbGeo.from('open_positions')
        .update({ is_active: false })
        .eq('id', row.geo_open_position_id);
      if(error) throw error;
      row.geo_linked = false;
      row.geo_open_position_id = null;
      showToast(`${row.name} 거현량 연계 해제됨`, 'success');
    } else {
      // 연계: 기존 open_position이 있으면 활성화, 없으면 새로 생성
      const { data: existing } = await sbGeo.from('open_positions')
        .select('id').eq('resignation_id', id).maybeSingle();
      if(existing){
        const { error } = await sbGeo.from('open_positions')
          .update({ is_active: true }).eq('id', existing.id);
        if(error) throw error;
        row.geo_open_position_id = existing.id;
      } else {
        const { data, error } = await sbGeo.from('open_positions').insert({
          resignation_id: id,
          company_name: row.company_name || '대웅제약',
          division: row.division || '',
          center: row.center || '',
          team: row.team || '',
          position_title: [row.division, row.center, row.team].filter(Boolean).join(' > '),
          is_active: true,
        }).select('id').single();
        if(error) throw error;
        row.geo_open_position_id = data.id;
      }
      row.geo_linked = true;
      showToast(`${row.name} 거현량 연계 완료 → 거현량 사이트에 공석 노출`, 'success');
    }
    renderResigBody();
  } catch(e) {
    console.error(e);
    alert('거현량 연계 처리 실패: ' + (e.message || e));
    if(btn){ btn.disabled = false; btn.style.opacity = 1; }
  }
}

function alertCard(r,today,urgent) {
  const dday=r.resignation_date?daysBetween(today,r.resignation_date):null;
  const ddayVal = dday!==null?(dday>=0?'-'+dday:'+'+Math.abs(dday)):'-';
  const missing=[];
  if(!r.account_deleted) missing.push('계정삭제');
  if(!r.resignation_letter_submitted) missing.push('사직원제출');
  if(!r.sap_posted) missing.push('SAP발령');
  const borderColor = urgent ? '#FECACA' : '#FDE68A';
  const bgColor = urgent ? '#FEF2F2' : '#FFFBEB';
  const accentColor = urgent ? '#DC2626' : '#D97706';
  return `<div style="background:#fff;border:1.5px solid ${borderColor};border-radius:12px;padding:18px 20px;display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:10px;">
    <div style="display:flex;align-items:center;gap:16px;min-width:0;flex:1;">
      <div style="width:56px;height:56px;border-radius:10px;background:${bgColor};color:${accentColor};display:flex;align-items:center;justify-content:center;flex-shrink:0;flex-direction:column;">
        <div style="font-size:10px;font-weight:600;">D</div>
        <div style="font-size:18px;font-weight:800;line-height:1;">${ddayVal}</div>
      </div>
      <div style="min-width:0;flex:1;">
        <div style="font-weight:600;color:#111827;white-space:nowrap;">${esc(r.name)} <span style="font-size:13px;color:#6B7280;font-weight:400;">(${esc(r.employee_id)})</span></div>
        <div style="font-size:12px;color:#6B7280;margin-top:2px;white-space:nowrap;">${[r.division,r.center,r.team].filter(Boolean).map(esc).join(' · ')}</div>
        <div style="margin-top:6px;display:flex;flex-wrap:wrap;gap:5px;">${missing.map(m=>`<span style="padding:2px 8px;background:#F3F4F6;color:#4B5563;border-radius:4px;font-size:11px;">✗ ${m}</span>`).join('')}</div>

  </div>`;
}

function selectBatch(batchId) {
  _selectedBatchId = batchId;
  document.querySelectorAll('[id^="batchBtn-"]').forEach(b=>{
    b.style.background='#fff'; b.style.borderColor='#E5E5E7'; b.style.color='';
  });
  const active = document.getElementById(`batchBtn-${batchId}`);
  if(active){ active.style.background='#1D1D1F'; active.style.borderColor='#1D1D1F'; active.style.color='#fff'; active.querySelectorAll('*').forEach(el=>el.style.color='#fff'); }
  const hdr = document.getElementById('empHeader');
  if(batchId==='all'){ hdr.textContent = '전체 직원'; }
  else {
    const b = _uploadBatches.find(x=>x.id===batchId);
    hdr.textContent = b ? `${formatDate(b.uploaded_at)} 업로드 배치` : '배치';
  }
  renderEmpList();
}

function renderEmpList() {
  const body = document.getElementById('empListBody');
  if(!body) return;
  const q  = (document.getElementById('empQ')?.value||'').toLowerCase().trim();
  const fd = document.getElementById('empFDiv')?.value||'';
  const fs = document.getElementById('empFSt')?.value||'';
  const filtered = _employeesCache.filter(e=>{
    if(_selectedBatchId!=='all' && e.last_upload_id!==_selectedBatchId) return false;
    if(fd && e.division!==fd) return false;
    if(fs && e.employment_status!==fs) return false;
    if(q){ const h = `${e.employee_id||''} ${e.name||''} ${e.division||''} ${e.center||''} ${e.team||''}`.toLowerCase(); if(!h.includes(q)) return false; }
    return true;
  });
  document.getElementById('empListCnt').textContent = `· ${filtered.length}명`;
  if(filtered.length===0){ body.innerHTML = `<tr><td colspan="8" style="padding:36px;text-align:center;color:#86868B;font-size:13px;">조건에 맞는 직원이 없습니다.</td></tr>`; return; }
  body.innerHTML = filtered.slice(0, 500).map(e=>{
    const stColor = e.employment_status==='재직' ? '#34C759' : e.employment_status==='휴직' ? '#FF9500' : '#8E8E93';
    const stBg    = e.employment_status==='재직' ? '#F0FDF4' : e.employment_status==='휴직' ? '#FFFBEB' : '#F5F5F7';
    return `<tr style="border-bottom:1px solid #F0F0F3;" onmouseover="this.style.background='#FAFAFA'" onmouseout="this.style.background=''">
      <td style="padding:10px 14px;font-family:monospace;color:#1D1D1F;">${esc(e.employee_id)}</td>
      <td style="padding:10px 14px;font-weight:600;color:#1D1D1F;">${esc(e.name)}</td>
      <td style="padding:10px 14px;color:#374151;">${esc(e.division||'-')}</td>
      <td style="padding:10px 14px;color:#374151;">${esc(e.center||'-')}</td>
      <td style="padding:10px 14px;color:#374151;">${esc(e.team||'-')}</td>
      <td style="padding:10px 14px;color:#6E6E73;white-space:nowrap;">${formatDate(e.hire_date)}</td>
      <td style="padding:10px 14px;"><span style="display:inline-block;padding:2px 8px;border-radius:5px;font-size:11px;font-weight:700;background:${stBg};color:${stColor};">${esc(e.employment_status||'-')}</span></td>
      <td style="padding:10px 14px;text-align:center;">
        <button onclick="copyLoginInfo('${esc(e.employee_id)}','${esc(e.name)}')" title="로그인 정보 복사" style="font-size:11px;padding:4px 10px;background:#F5F5F7;border:1px solid #D2D2D7;border-radius:6px;cursor:pointer;color:#1D1D1F;font-weight:600;">📋</button>
      </td>
    </tr>`;
  }).join('') + (filtered.length>500?`<tr><td colspan="8" style="padding:10px;text-align:center;color:#86868B;font-size:12px;">... 상위 500명만 표시 (총 ${filtered.length}명)</td></tr>`:'');
}

function copyLoginInfo(empId, name) {
  const text = `사번: ${empId}\n이름: ${name}`;
  navigator.clipboard?.writeText(text);
  showToast(`${name} 로그인 정보 복사됨`);
}

function exportEmps() {
  const data = _employeesCache.filter(e => _selectedBatchId==='all' || e.last_upload_id===_selectedBatchId).map(e=>({ 사번:e.employee_id, 이름:e.name, 회사명:e.company_name, 본부:e.division, 센터:e.center, 팀:e.team, 입사일:formatDate(e.hire_date), 재직상태:e.employment_status, 생년월일:formatDate(e.birth_date) }));
  const ws=XLSX.utils.json_to_sheet(data); const wb=XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb,ws,'직원명부'); XLSX.writeFile(wb,`직원명부_${new Date().toISOString().slice(0,10)}.xlsx`);

const HDR_MAP={'사번':'employee_id','이름':'name','회사명':'company_name','본부':'division','센터':'center','팀':'team','입사일':'hire_date','재직상태':'employment_status','생년월일':'birth_date'};
function parseExcelDate(v){ if(v==null||v==='') return null; if(typeof v==='number'){ const d=XLSX.SSF.parse_date_code(v); if(!d) return null; return `${d.y}-${String(d.m).padStart(2,'0')}-${String(d.d).padStart(2,'0')}`; } if(typeof v==='string'){ const s=v.trim().replace(/\./g,'-').replace(/\//g,'-'); const m=s.match(/^(\d{4})-(\d{1,2})-(\d{1,2})$/); if(m) return `${m[1]}-${m[2].padStart(2,'0')}-${m[3].padStart(2,'0')}`; } return null; }
async function handleUpload() {
  const file=document.getElementById('fileInput').files[0]; if(!file) return;
  const btn=document.getElementById('uploadBtn'), msgBox=document.getElementById('uploadMsg');
  btn.disabled=true; btn.textContent='업로드 중...'; msgBox.classList.add('hidden');
  try {
    const buf=await file.arrayBuffer(); const wb2=XLSX.read(buf,{type:'array'}); const ws=wb2.Sheets[wb2.SheetNames[0]];
    const raw=XLSX.utils.sheet_to_json(ws,{defval:null}); if(!raw.length) throw new Error('데이터 없음');
    const { data: company }=await sbAdmin.from('companies').select('id').eq('code',SUPABASE_CONFIG.companyCode).single(); if(!company) throw new Error('회사 정보 없음');
    const { data: logRow }=await sbAdmin.from('employee_upload_logs').insert({company_id:company.id,uploaded_file_name:file.name,total_count:raw.length,uploaded_by:adminUser?.email||null}).select().single();
    const records=raw.map(row=>{ const m={company_id:company.id,last_upload_id:logRow.id}; for(const[k,v] of Object.entries(row)){ const f=HDR_MAP[k.trim()]; if(!f) continue; if(f==='hire_date'||f==='birth_date') m[f]=parseExcelDate(v); else m[f]=v==null?null:String(v).trim(); } return m; }).filter(r=>r.employee_id&&r.name);
    if(!records.length) throw new Error('유효 레코드 없음');
    const empIds=records.map(r=>r.employee_id);
    const { data: existing }=await sbAdmin.from('employees_master').select('employee_id').eq('company_id',company.id).in('employee_id',empIds);
    const existingSet=new Set((existing||[]).map(e=>e.employee_id));
    const insertedCount=records.filter(r=>!existingSet.has(r.employee_id)).length, updatedCount=records.length-insertedCount;
    for(let i=0;i<records.length;i+=500){ const { error }=await sbAdmin.from('employees_master').upsert(records.slice(i,i+500),{onConflict:'company_id,employee_id'}); if(error) throw error; }
    await sbAdmin.from('employee_upload_logs').update({inserted_count:insertedCount,updated_count:updatedCount}).eq('id',logRow.id);
    msgBox.className='mt-3 text-sm text-accent-green bg-green-50 border border-green-100 rounded-lg px-3 py-2';
    msgBox.textContent=`완료 · 총 ${records.length}건 (신규 ${insertedCount} · 갱신 ${updatedCount})`;
    msgBox.classList.remove('hidden');
    setTimeout(()=>renderUpload(),1500);
  } catch(err) {
    msgBox.className='mt-3 text-sm text-accent-red bg-red-50 border border-red-100 rounded-lg px-3 py-2';
    msgBox.textContent='실패: '+(err.message||'오류'); msgBox.classList.remove('hidden');
  } finally { btn.disabled=false; btn.textContent='📤 업로드 실행'; }
}

  const label = (_archiveYear||'전체') + (_archiveQ>0?'_Q'+_archiveQ:'');
  const rows = _archiveData.map(r=>({
    상태: r.completion_status?'완료':'미완료',
    사번: r.employee_id, 이름: r.name,
    회사명: r.company_name, 본부: r.division, 센터: r.center, 팀: r.team,

  const ws=XLSX.utils.json_to_sheet(rows); const wb=XLSX.utils.book_new();

  XLSX.writeFile(wb,`퇴직자_보관함_${label}.xlsx`);
}

async function lookupEmployeeByEmpId(empId) {
  if(!empId) return null;
  const { data: emp } = await sbAdmin.from('employees_master').select('employee_id,name,division,center,team,company_name,employment_status').eq('employee_id', empId).maybeSingle();
  if(!emp) return null;
  const email = `${empId}@daewoong.hr.local`;
  try {
    const { data } = await sbAdmin.auth.admin.listUsers({ perPage: 500 });
    const u = (data?.users||[]).find(x => x.email?.toLowerCase() === email.toLowerCase());
    return { ...emp, email, user_id: u?.id || null };
  } catch(e){ return { ...emp, email, user_id:null }; }

            <select id="newRole" style="height:40px;padding:0 12px;border:1.5px solid #E5E7EB;border-radius:8px;font-size:13px;background:#fff;outline:none;min-width:160px;">
              ${ROLE_INFO.map(r=>`<option value="${r.key}">${r.label}</option>`).join('')}
            </select>
            <button onclick="grantRole()" id="grantBtn" disabled style="height:40px;padding:0 18px;background:#0066FF;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;opacity:0.4;">+ 부여</button>
          </div>
          <div id="empPreview"></div>
        </div>
        <div id="roleMsg" class="hidden" style="margin-top:10px;"></div>
      </div>

      <!-- 부여된 권한 -->
      <div style="background:#fff;border:1px solid #E5E7EB;border-radius:12px;overflow:hidden;">
        <div style="padding:14px 18px;border-bottom:1px solid #F3F4F6;font-size:14px;font-weight:700;color:#1D1D1F;">부여된 권한 (${(roles||[]).length})</div>
        <div style="overflow-x:auto;">
          <table style="width:100%;border-collapse:collapse;font-size:13px;">
            <thead><tr style="background:#F9FAFB;border-bottom:1.5px solid #E5E7EB;">
              <th style="padding:11px 16px;text-align:left;font-weight:600;color:#4B5563;white-space:nowrap;">사번</th>
              <th style="padding:11px 16px;text-align:left;font-weight:600;color:#4B5563;white-space:nowrap;">이름</th>
              <th style="padding:11px 16px;text-align:left;font-weight:600;color:#4B5563;white-space:nowrap;">소속</th>
              <th style="padding:11px 16px;text-align:left;font-weight:600;color:#4B5563;white-space:nowrap;">Role</th>
              <th style="padding:11px 16px;text-align:left;font-weight:600;color:#4B5563;white-space:nowrap;">부여일</th>
              <th style="padding:11px 16px;width:40px;"></th>
            </tr></thead>
            <tbody>${!roles||roles.length===0
              ? `<tr><td colspan="6" style="padding:36px;text-align:center;color:#9CA3AF;">없음</td></tr>`
              : roles.map(r=>{
                  const emp = empMap[r.user_id] || {};
                  const empId = (emp.email||'').split('@')[0] || '-';
                  const roleInfo = ROLE_INFO.find(x=>x.key===r.role_name) || {label:r.role_name,color:'#6B7280'};
                  return `<tr style="border-bottom:1px solid #F3F4F6;">
                    <td style="padding:11px 16px;font-family:monospace;font-size:12px;color:#374151;">${esc(empId)}</td>
                    <td style="padding:11px 16px;font-weight:600;color:#111827;">${esc(emp.name||'-')}</td>
                    <td style="padding:11px 16px;color:#6B7280;font-size:12px;">${esc([emp.division,emp.center,emp.team].filter(Boolean).join(' · ')||'-')}</td>
                    <td style="padding:11px 16px;"><span style="display:inline-block;padding:2px 8px;border-radius:5px;font-size:11px;font-weight:700;background:${roleInfo.color}1A;color:${roleInfo.color};">${esc(roleInfo.label)}</span></td>
                    <td style="padding:11px 16px;color:#9CA3AF;font-size:12px;white-space:nowrap;">${formatDateTime(r.granted_at)}</td>
                    <td style="padding:11px 16px;text-align:right;"><button onclick="revokeRole('${r.id}')" title="회수" style="color:#9CA3AF;background:none;border:none;cursor:pointer;font-size:14px;" onmouseover="this.style.color='#DC2626'" onmouseout="this.style.color='#9CA3AF'">🗑</button></td>
                  </tr>`;
                }).join('')}</tbody>
          </table>
        </div>
      </div>
    </div>`;
}

let _empLookupTimer = null;
async function onEmpIdInput() {
  const val = document.getElementById('empIdInput').value.trim();
  const preview = document.getElementById('empPreview');
  const btn = document.getElementById('grantBtn');
  clearTimeout(_empLookupTimer);
  if(!val){ preview.innerHTML=''; btn.disabled=true; btn.style.opacity=0.4; return; }
  preview.innerHTML = `<div style="font-size:12px;color:#9CA3AF;padding:6px 2px;">조회 중...</div>`;
  _empLookupTimer = setTimeout(async ()=>{
    const emp = await lookupEmployeeByEmpId(val);
    if(!emp){
      preview.innerHTML = `<div style="padding:10px 14px;background:#FEF2F2;border:1px solid #FECACA;border-radius:8px;font-size:12.5px;color:#991B1B;">✗ 사번 <strong>${esc(val)}</strong> 에 해당하는 직원을 찾을 수 없습니다.</div>`;
      btn.disabled=true; btn.style.opacity=0.4; btn.dataset.userId='';
      return;
    }
    const hasAccount = !!emp.user_id;
    preview.innerHTML = `
      <div style="padding:12px 14px;background:${hasAccount?'#F0FDFA':'#FFFBEB'};border:1px solid ${hasAccount?'#99F6E4':'#FDE68A'};border-radius:8px;">
        <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
          <div style="width:36px;height:36px;border-radius:50%;background:${hasAccount?'#0D9488':'#F59E0B'};color:#fff;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;">${(emp.name||'?')[0]}</div>
          <div style="flex:1;min-width:180px;">
            <div style="font-size:14px;font-weight:700;color:#111827;">${esc(emp.name)} <span style="font-size:12px;font-weight:400;color:#6B7280;margin-left:4px;">(${esc(emp.employee_id)})</span></div>
            <div style="font-size:12px;color:#6B7280;margin-top:2px;">${esc([emp.division,emp.center,emp.team].filter(Boolean).join(' > ')||'-')}</div>
            <div style="font-size:11px;color:${hasAccount?'#0F766E':'#92400E'};margin-top:3px;">${hasAccount?`✓ 로그인 계정 확인됨 (${emp.email})`:`⚠️ 로그인 계정이 없습니다 (관리자 계정 미등록 직원)`}</div>
          </div>
        </div>
      </div>`;
    btn.disabled = !hasAccount; btn.style.opacity = hasAccount ? 1 : 0.4;
    btn.dataset.userId = emp.user_id || '';
  }, 300);
}

async function grantRole() {
  const btn=document.getElementById('grantBtn');
  const userId = btn.dataset.userId;
  const role=document.getElementById('newRole').value;
  const msg=document.getElementById('roleMsg');
  if(!userId){ msg.className='text-sm'; msg.style.cssText='padding:10px 14px;background:#FEF2F2;border:1px solid #FECACA;border-radius:8px;color:#991B1B;font-size:12.5px;margin-top:10px;'; msg.textContent='직원을 먼저 조회해주세요.'; msg.classList.remove('hidden'); return; }
  const { error }=await sbAdmin.from('user_roles').insert({user_id:userId,role_name:role,granted_by:adminUser.id});
  if(error){ msg.style.cssText='padding:10px 14px;background:#FEF2F2;border:1px solid #FECACA;border-radius:8px;color:#991B1B;font-size:12.5px;margin-top:10px;'; msg.textContent=error.message; msg.classList.remove('hidden'); return; }
  renderRoles();
}
async function revokeRole(id) {
  if(!confirm('이 권한을 회수하시겠습니까?')) return;
  const { error }=await sbAdmin.from('user_roles').delete().eq('id',id);
  if(error){ alert(error.message); return; }
  renderRoles();
}

async function openConnModal(row) {
  document.getElementById('connModalTitle').textContent = `${esc(row.name)} 포지션 연결 희망자`;
  document.getElementById('connModalSub').textContent = [row.division, row.center, row.team].filter(Boolean).join(' > ') + ' · 퇴사일 ' + formatDate(row.resignation_date);
  document.getElementById('connModal').classList.remove('hidden');
  document.body.style.overflow = 'hidden';
  const el = document.getElementById('connResults');
  el.innerHTML = `<div class="text-sm text-ink-400 py-4 text-center">조회 중...</div>`;

  // 포지션 찾기 (division+team 기준)
  const { data: positions } = await sbGeo.from('open_positions')
    .select('id')
    .eq('division', row.division || '')
    .eq('team', row.team || '')
    .eq('is_active', true)
    .order('created_at', { ascending: false })
    .limit(5);

  if (!positions || positions.length === 0) {
    el.innerHTML = `<div class="text-center py-10 text-ink-400 text-sm">
      <div style="font-size:32px;margin-bottom:8px;">📭</div>
      아직 거현량 사이트에서 연결 희망한 인원이 없습니다.<br/>
      <span class="text-xs mt-2 block">거현량 사이트에서 해당 포지션이 등록되면 이곳에 표시됩니다.</span>
    </div>`;
    return;
  }

  const posIds = positions.map(p => p.id);
  const { data: conns } = await sbGeo.from('position_connections')
    .select('*')
    .in('position_id', posIds)
    .order('created_at', { ascending: false });

  if (!conns || conns.length === 0) {
    el.innerHTML = `<div class="text-center py-10 text-ink-400 text-sm">
      <div style="font-size:32px;margin-bottom:8px;">📭</div>
      아직 연결 희망자가 없습니다.
    </div>`;
    return;
  }

  // 관련 geo_reports 병렬 fetch (report_id가 있다면)
  const reportIds = [...new Set(conns.map(c => c.report_id || c.geo_report_id || c.source_report_id).filter(Boolean))];
  let reportMap = {};
  if(reportIds.length){
    try {
      const { data: reports } = await sbGeo.from('geo_reports').select('id,title,status,created_at').in('id', reportIds);
      reportMap = Object.fromEntries((reports||[]).map(r=>[r.id, r]));
    } catch(e){}
  }

  const pickRecommender = c => c.recommender_name || c.recommender_email || c.recommended_by || c.submitted_by_name || c.submitted_by || c.created_by_email || c.created_by_name || c.created_by || c.connected_by || c.referrer_name || c.referrer_email || null;
  const pickReportId = c => c.report_id || c.geo_report_id || c.source_report_id || null;

  el.innerHTML = `
    <div class="text-xs text-ink-500 mb-3">총 ${conns.length}명이 연결을 희망했습니다.</div>
    ${conns.map(c => {
      const recommender = pickRecommender(c);
      const reportId = pickReportId(c);
      const report = reportId ? reportMap[reportId] : null;
      return `
      <div style="border:1.5px solid #E8EAF6;border-radius:12px;padding:16px;background:#fff;margin-bottom:10px;">
        <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:10px;">
          <div style="flex:1;min-width:0;">
            <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:4px;">
              <span style="font-size:15px;font-weight:800;color:#1D1D1F;">${esc(c.expert_name || '이름 미제공')}</span>
              <span style="font-size:11px;background:#F5F5F7;color:#0052CC;padding:2px 8px;border-radius:20px;font-weight:700;">연결 희망</span>
              <span style="font-size:11px;padding:2px 8px;border-radius:20px;font-weight:700;${c.status==='accepted'?'background:#F0FDF4;color:#16A34A;':c.status==='rejected'?'background:#FEF2F2;color:#DC2626;':'background:#FFFBEB;color:#D97706;'}">${c.status==='accepted'?'수락':c.status==='rejected'?'거절':'검토중'}</span>
            </div>
            <div style="font-size:12px;color:#6B7280;">${esc(c.expert_org || '')}${c.expert_title ? ' · ' + esc(c.expert_title) : ''}</div>
            ${c.expert_summary ? `<div style="margin-top:8px;font-size:13px;color:#374151;line-height:1.6;padding:10px;background:#F8FAFF;border-radius:8px;">${esc(c.expert_summary)}</div>` : ''}
            ${c.message ? `<div style="margin-top:6px;font-size:12px;color:#0066FF;font-style:italic;">"${esc(c.message)}"</div>` : ''}
          </div>
          <div style="text-align:right;flex-shrink:0;">
            <div style="font-size:11px;color:#94A3B8;">${formatDate(c.created_at)}</div>
            <select onchange="updateConnStatus('${c.id}', this.value)" style="margin-top:6px;font-size:11px;border:1px solid #E5E7EB;border-radius:6px;padding:3px 6px;color:#374151;">
              <option value="pending" ${c.status==='pending'?'selected':''}>검토중</option>
              <option value="accepted" ${c.status==='accepted'?'selected':''}>수락</option>
              <option value="rejected" ${c.status==='rejected'?'selected':''}>거절</option>
            </select>
          </div>
        </div>

        <!-- 추천자 / 리포트 정보 -->
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;padding-top:10px;border-top:1px dashed #E5E7EB;">
          <div style="padding:8px 12px;background:#F0FDFA;border:1px solid #CCFBF1;border-radius:8px;">
            <div style="font-size:10px;font-weight:700;color:#0F766E;letter-spacing:0.08em;text-transform:uppercase;margin-bottom:3px;">👤 추천자</div>
            ${recommender
              ? `<div style="font-size:12.5px;color:#134E4A;font-weight:600;word-break:break-all;">${esc(recommender)}</div>`
              : `<div style="font-size:12px;color:#9CA3AF;">추천자 정보 없음</div>`}
          </div>
          <div style="padding:8px 12px;background:#F5F5F7;border:1px solid #D2D2D7;border-radius:8px;">
            <div style="font-size:10px;font-weight:700;color:#1D1D1F;letter-spacing:0.08em;text-transform:uppercase;margin-bottom:3px;">📄 거현량 리포트</div>
            ${report
              ? `<div style="font-size:12.5px;color:#1D1D1F;font-weight:600;word-break:break-word;line-height:1.4;">${esc(report.title||'제목 없음')}</div>
                 <div style="font-size:10.5px;color:#1D1D1F;margin-top:2px;">${esc(report.status||'')} · ${formatDate(report.created_at)}</div>`
              : reportId
                ? `<div style="font-size:11px;color:#6B7280;font-family:monospace;">ID: ${esc(reportId).slice(0,8)}...</div>`
                : `<div style="font-size:12px;color:#9CA3AF;">연결된 리포트 없음</div>`}
          </div>
        </div>
      </div>`}).join('')}
  `;
}

async function updateConnStatus(id, status) {
  await sbGeo.from('position_connections').update({ status }).eq('id', id);
}

function closeConnModal() {
  document.getElementById('connModal').classList.add('hidden');
  document.body.style.overflow = '';
}

let _recoRow = null;

function openRecoModal(id) {
  _recoRow = adminRows.find(r => r.id === id);
  if (!_recoRow) return;
  document.getElementById('recoModalTitle').textContent = `${esc(_recoRow.name)} 후임 인재 추천`;
  document.getElementById('recoModalSub').textContent = [_recoRow.division, _recoRow.center, _recoRow.team].filter(Boolean).map(esc).join(' · ') + ' · 퇴사일 ' + formatDate(_recoRow.resignation_date);
  document.getElementById('recoKeywordInput').value = [_recoRow.division, _recoRow.center, _recoRow.team].filter(Boolean).join(' ');
  document.getElementById('recoModal').classList.remove('hidden');
  document.body.style.overflow = 'hidden';
  runRecoSearch();
}
function closeRecoModal() {
  document.getElementById('recoModal').classList.add('hidden');
  document.body.style.overflow = '';
  _recoRow = null;
}
document.getElementById('recoModal').addEventListener('click', function(e){ if(e.target===this) closeRecoModal(); });

function geoTokenize(text) {
  if (!text) return [];
  return [...new Set(text.replace(/[^\w가-힣\s]/g,' ').split(/\s+/).map(t=>t.trim()).filter(t=>t.length>=2))];
}

async function runRecoSearch() {
  if (!sbGeo) return;
  const el = document.getElementById('recoResults');
  el.innerHTML = `<div class="flex items-center justify-center py-10"><div class="w-5 h-5 rounded-full border-2 border-ink-200 border-t-brand animate-spin mr-3"></div><span class="text-sm text-ink-500">매칭 중...</span></div>`;
  const keywords = geoTokenize(document.getElementById('recoKeywordInput').value.trim());
  const { data: experts, error } = await sbGeo.from('geo_experts').select('id,name,org,title,expertise,key_competencies,career,keywords,recruitable,recruit_note').limit(500);
  if (error) { el.innerHTML=`<div class="py-8 text-center text-sm text-accent-red">조회 오류: ${esc(error.message)}</div>`; return; }
  if (!experts?.length) { el.innerHTML=`<div class="py-8 text-center text-sm text-ink-400">거현량에 등록된 전문가가 없습니다.</div>`; return; }
  const scored = experts.map(ex => {
    let score=0; const matchedKw=[];
    const kwArr=Array.isArray(ex.keywords)?ex.keywords:(ex.keywords?String(ex.keywords).split(','):[]);
    const fields=[ex.expertise,ex.key_competencies,ex.career,ex.org,ex.title,kwArr.join(' ')].filter(Boolean).join(' ').toLowerCase();
    keywords.forEach(k=>{ if(fields.includes(k.toLowerCase())){ score+=10; matchedKw.push(k); } });
    if(ex.recruitable) score+=8;
    const reasons=[];
    if(matchedKw.length) reasons.push(`"${matchedKw.slice(0,3).join('", "')}" 키워드 일치`);
    if(ex.recruitable) reasons.push('채용 가능 Pool');
    return { ex, score, reasons: reasons.join(' · ')||'관련 분야 전문가' };
  }).filter(x=>x.score>0).sort((a,b)=>b.score-a.score).slice(0,8);
  if(!scored.length) { el.innerHTML=`<div class="py-8 text-center"><div class="text-sm text-ink-500 mb-1">매칭되는 전문가가 없습니다.</div><div class="text-xs text-ink-400">직무·역량 등 구체적 키워드로 재검색해 보세요.</div></div>`; return; }
  el.innerHTML = `
    <div class="text-xs text-ink-500 mb-3">총 ${scored.length}명 매칭</div>
    ${scored.map(({ex,score,reasons})=>`
      <div class="border border-ink-100 rounded-xl p-4 bg-white hover:border-brand/30 hover:shadow-soft transition">
        <div class="flex items-start justify-between gap-3">
          <div class="min-w-0">
            <div class="flex items-center gap-2 flex-wrap">
              <span class="font-semibold text-ink-900">${esc(ex.name)}</span>
              ${ex.recruitable?'<span class="px-1.5 py-0.5 bg-green-50 text-accent-green border border-green-100 rounded text-[10px] font-semibold">채용Pool</span>':''}
            </div>
            <div class="mt-0.5 text-xs text-ink-500">${esc(ex.org||'')}${ex.title?' · '+esc(ex.title):''}</div>
          </div>
          <div class="shrink-0 text-right">
            <div class="text-xl font-bold text-brand tabular-nums">${score}</div>
            <div class="text-[10px] text-ink-400">점</div>
          </div>
        </div>
        ${ex.expertise?`<div class="mt-2 text-xs text-ink-600 leading-relaxed">${esc(ex.expertise)}</div>`:''}
        <div class="mt-2 text-[11px] text-brand font-medium">💡 ${esc(reasons)}</div>
        ${ex.recruit_note?`<div class="mt-1.5 text-[11px] text-ink-500 bg-ink-50 rounded px-2 py-1">📝 ${esc(ex.recruit_note)}</div>`:''}
      </div>`).join('')}`;
}
