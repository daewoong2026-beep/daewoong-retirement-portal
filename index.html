<script>

// 클라이언트 초기화
// ============================================================
const sb     = createSupabaseClient();                                             // retirement 스키마 (anon)
const sbAdmin = SUPABASE_CONFIG.serviceKey                                         // retirement 스키마 (service role — RLS 우회)
  ? supabase.createClient(SUPABASE_CONFIG.url, SUPABASE_CONFIG.serviceKey, {
      db: { schema: SUPABASE_CONFIG.schema },
      auth: { persistSession: false, autoRefreshToken: false, detectSessionInUrl: false }
    })
  : sb;
const sbGeo  = sb ? supabase.createClient(SUPABASE_CONFIG.url, SUPABASE_CONFIG.anonKey) : null; // public 스키마 (거현량)

const root = document.getElementById('root');

// ============================================================
// 앱 상태
// ============================================================
let appMode     = null;   // 'employee' | 'admin'
let adminUser   = null;
let adminRoles  = [];
let adminView   = 'dashboard';
let adminRows   = [];     // 퇴직자 목록 캐시
let _archiveYear = null, _archiveQ = 0, _archiveData = [];

// ============================================================
// 초기화 — 기존 세션 복원
// ============================================================
(async function init() {
  root.innerHTML = `<div class="min-h-screen flex items-center justify-center"><div class="w-8 h-8 rounded-full border-2 border-ink-200 border-t-brand animate-spin"></div></div>`;

  if (!sb) { renderLogin(); return; }

  // 관리자 세션 체크
  const { data: { session } } = await sb.auth.getSession();
  if (session) {
    adminUser = session.user;
    await loadAdminRoles();
    if (adminRoles.length > 0) { appMode = 'admin'; renderAdminApp(); return; }
  }

  // 직원 세션 체크
  const emp = getEmpIdentity();
  if (emp) { appMode = 'employee'; routeEmployee(); return; }

  renderLogin();
})();

// ============================================================
// 공통 유틸
// ============================================================
function getEmpIdentity() {
  try {
    const d = JSON.parse(sessionStorage.getItem('emp_identity') || 'null');
    if (!d) return null;
    if (Date.now() - d.ts > 30 * 60 * 1000) { sessionStorage.removeItem('emp_identity'); return null; }
    return d;
  } catch { return null; }
}
function setEmpIdentity(employee_id, name) {
  sessionStorage.setItem('emp_identity', JSON.stringify({ employee_id, name, ts: Date.now() }));
}
function clearEmpIdentity() { sessionStorage.removeItem('emp_identity'); }

async function loadAdminRoles() {
  const { data } = await sbAdmin.from('user_roles').select('role_name').eq('user_id', adminUser.id);
  adminRoles = (data || []).map(r => r.role_name);
}

async function logout() {
  await sb.auth.signOut();
  adminUser = null; adminRoles = []; appMode = null;
  clearEmpIdentity();
  renderLogin();
}

function bindSmartLogin() {
  const field1   = document.getElementById('field1');
  const field2   = document.getElementById('field2');
  const f2Label  = document.getElementById('f2Label');
  const f2Hint   = document.getElementById('f2Hint');
  const badge    = document.getElementById('dwBadge');

  // 숫자만 → 직원, 그 외 → 관리자
  function isAdmin() { return field1.value.trim() !== '' && !/^\d+$/.test(field1.value.trim()); }

  function updateMode() {
    if (isAdmin()) {
      f2Label.textContent = '비밀번호';
      field2.type = 'password';
      field2.placeholder = '비밀번호를 입력해 주세요.';
      f2Hint.textContent = '관리자(HR 담당자) 계정으로 로그인합니다.';
      badge.innerHTML = '<span class="dot"></span>관리자 로그인';
      badge.className = 'lg-badge admin';
    } else {
      f2Label.textContent = '이름';
      field2.type = 'text';
      field2.placeholder = '홍길동';
      f2Hint.textContent = '직원명부에 등록된 이름을 입력해 주세요.';
      badge.innerHTML = '<span class="dot"></span>직원 로그인';
      badge.className = 'lg-badge emp';
    }
  }

  field1.addEventListener('input', updateMode);

  document.getElementById('smartLoginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const err = document.getElementById('loginErr');
    const btn = document.getElementById('loginBtn');
    err.classList.remove('on');
    btn.disabled = true; btn.textContent = '확인 중...';

    const v1 = field1.value.trim();
    const v2 = field2.value.trim();

    try {
      if (isAdmin()) {
        // 관리자: 아이디에 @ 없으면 @daewoong.co.kr 자동 보완
        const email = v1.includes('@') ? v1 : v1 + '@daewoong.co.kr';
        const { data, error } = await sb.auth.signInWithPassword({ email, password: v2 });
        if (error) throw new Error('아이디 또는 비밀번호가 올바르지 않습니다.');
        adminUser = data.user;
        await loadAdminRoles();
        if (adminRoles.length === 0) {
          await sb.auth.signOut();
          throw new Error('로그인은 성공했지만 접근 권한이 없습니다. HR 관리자에게 문의하세요.');
        }
        appMode = 'admin';
        renderAdminApp();
      } else {
        // 직원: 사번 + 이름 RPC
        const { data, error } = await sb.rpc('check_employee_identity', {
          p_employee_id: v1,
          p_name: v2,
        });
        if (error) throw error;
        if (!data) throw new Error('사번과 이름이 일치하지 않습니다.');
        setEmpIdentity(v1, v2);
        appMode = 'employee';
        renderPortal();
      }
    } catch (e2) {

// ---- 대시보드 ----
// ── AI 인사이트 분석기 ──────────────────────────────────
function generateInsights(list, Y, M) {
  const insights = [];
  const thisMonth = list.filter(r => { if (!r.resignation_date) return false; const d = new Date(r.resignation_date); return d.getFullYear()===Y && d.getMonth()===M; }).length;
  const lastMonth = list.filter(r => { if (!r.resignation_date) return false; const d = new Date(r.resignation_date); const lm = new Date(Y, M-1, 1); return d.getFullYear()===lm.getFullYear() && d.getMonth()===lm.getMonth(); }).length;
  const d5 = list.filter(r => r.is_d5_warning).length;
  const incomplete = list.filter(r => !r.completion_status).length;
  const tenures = list.map(r => r.tenure_months).filter(v => v != null);
  const avgTenure = tenures.length ? Math.round(tenures.reduce((a,b)=>a+b,0)/tenures.length) : 0;
  const shortTenure = tenures.filter(t => t < 24).length;
  const divMap = new Map(); list.forEach(r => { const k = r.division||'미지정'; divMap.set(k,(divMap.get(k)||0)+1); });
  const topDiv = Array.from(divMap.entries()).sort((a,b)=>b[1]-a[1])[0];

  if (thisMonth > 0 && lastMonth > 0) {
    const chg = Math.round((thisMonth - lastMonth) / lastMonth * 100);
    if (chg > 20) insights.push({ level:'warn', icon:'📈', text:`이번 달 퇴직자(${thisMonth}명)가 전월 대비 ${chg}% 급증했습니다. 주요 원인 파악이 필요합니다.` });
    else if (chg < -20) insights.push({ level:'good', icon:'📉', text:`이번 달 퇴직자(${thisMonth}명)가 전월 대비 ${Math.abs(chg)}% 감소했습니다. 안정적인 흐름입니다.` });
    else insights.push({ level:'info', icon:'📊', text:`이번 달 퇴직자는 ${thisMonth}명으로 전월(${lastMonth}명) 대비 유사한 수준입니다.` });
  } else if (thisMonth > 0) {
    insights.push({ level:'info', icon:'📊', text:`이번 달 ${thisMonth}명의 퇴직이 접수되었습니다.` });
  }

  if (d5 > 0) insights.push({ level:'urgent', icon:'🚨', text:`D-5 경고 ${d5}건이 있습니다 — 5일 이내 처리 필요 업무를 즉시 확인하세요.` });
  if (incomplete > 3) insights.push({ level:'warn', icon:'⚠️', text:`미완료 처리 건수가 ${incomplete}건입니다. 인사 처리 지연이 발생할 수 있습니다.` });

  if (topDiv && topDiv[1] > 0) {
    const pct = Math.round(topDiv[1] / list.length * 100);
    insights.push({ level:'info', icon:'🏢', text:`${topDiv[0]}이 전체 퇴직자의 ${pct}%(${topDiv[1]}명)로 가장 높습니다. 해당 본부의 retention 전략 점검을 권장합니다.` });
  }

  if (avgTenure > 0 && avgTenure < 24) insights.push({ level:'warn', icon:'⏱️', text:`평균 재직기간이 ${avgTenure}개월(${(avgTenure/12).toFixed(1)}년)로 짧습니다. 온보딩·조기 이탈 방지 프로그램 검토가 필요합니다.` });
  else if (avgTenure >= 60) insights.push({ level:'good', icon:'✅', text:`평균 재직기간 ${avgTenure}개월(${(avgTenure/12).toFixed(1)}년)로 장기 근속 비율이 높은 편입니다.` });

  if (shortTenure > 0 && tenures.length > 0 && shortTenure / tenures.length > 0.3) {
    insights.push({ level:'warn', icon:'🔍', text:`2년 미만 단기 퇴직자가 ${shortTenure}명(${Math.round(shortTenure/tenures.length*100)}%)으로 높습니다. 채용 프로세스 및 직무 적합도 검토를 권장합니다.` });
  }

  if (insights.length === 0) insights.push({ level:'good', icon:'✅', text:'현재 특이 사항이 없습니다. 전반적으로 안정적인 인사 지표를 유지하고 있습니다.' });
  return insights;
}

  const ctr=document.getElementById('fCtr').value, tm=document.getElementById('fTeam').value;
  const st=document.getElementById('fSt').value;

// 코멘트 파싱 — 배열 형식, 구형식(flag JSON / 순수 텍스트) 마이그레이션 지원
function parseComments(raw) {
  if(!raw) return [];
  try {
    const o = JSON.parse(raw);
    if(Array.isArray(o)) return o;
    if(o && typeof o === 'object' && o.n) return [{a:'admin',t:'',m:o.n}];
  } catch(e) {}
  if(typeof raw === 'string' && raw.trim()) return [{a:'admin',t:'',m:raw.trim()}];
  return [];
}
function serializeComments(arr) { return arr.length ? JSON.stringify(arr) : null; }
function fmtCommentTime(iso) {
  if(!iso) return '';
  try {
    const d=new Date(iso), now=new Date(), diff=Math.floor((now-d)/1000);
    if(diff<60) return '방금';
    if(diff<3600) return Math.floor(diff/60)+'분 전';
    if(diff<86400) return Math.floor(diff/3600)+'시간 전';
    return d.toLocaleDateString('ko',{month:'short',day:'numeric'});
  } catch(e){ return ''; }
}
function authorInitial(a) { return ((a||'?')[0]).toUpperCase(); }

async function addComment(id) {
  const inp = document.getElementById(`comment-input-${id}`);
  if(!inp) return;
  const msg = inp.value.trim();
  if(!msg) return;
  const row = adminRows.find(r=>r.id===id);
  if(!row) return;
  const comments = parseComments(row.note);
  comments.push({ a: adminUser?.email || 'admin', t: new Date().toISOString(), m: msg });
  const newNote = serializeComments(comments);
  inp.value = '';
  row.note = newNote;
  await sbAdmin.from('resignation_requests').update({ note: newNote }).eq('id', id);
  const panel = document.getElementById('comment-panel');
  if(panel?._renderPanel) panel._renderPanel();
  renderResigBody();
}

async function deleteComment(id, idx) {
  if(!confirm('이 코멘트를 삭제하시겠습니까?')) return;
  const row = adminRows.find(r=>r.id===id);
  if(!row) return;
  const comments = parseComments(row.note);
  comments.splice(idx, 1);
  const newNote = serializeComments(comments);
  row.note = newNote;
  await sbAdmin.from('resignation_requests').update({ note: newNote }).eq('id', id);
  const panel = document.getElementById('comment-panel');
  if(panel?._renderPanel) panel._renderPanel();
  renderResigBody();
}
function chkBtn(id,field,on){ return `<button onclick="toggleTask('${id}','${field}',${on})" class="w-5 h-5 rounded border transition inline-flex items-center justify-center ${on?'bg-brand border-brand text-white':'bg-white border-ink-300 text-transparent hover:border-ink-400'}"><svg class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3"><path d="M5 13l4 4L19 7"/></svg></button>`; }
async function toggleTask(id, field, curr) {
  const newVal = !curr;
  const patch = { [field]: newVal };
  const now = new Date().toISOString();
  if(field==='account_deleted') patch.account_deleted_at=newVal?now:null;
  if(field==='resignation_letter_submitted') patch.resignation_letter_at=newVal?now:null;
  if(field==='sap_posted') patch.sap_posted_at=newVal?now:null;
  const { error } = await sbAdmin.from('resignation_admin_tasks').update(patch).eq('resignation_request_id',id);
  if(error){ alert('실패: '+error.message); return; }
  const idx = adminRows.findIndex(r=>r.id===id);
  if(idx>=0){
    adminRows[idx][field]=newVal;
    adminRows[idx].completion_status=adminRows[idx].account_deleted&&adminRows[idx].resignation_letter_submitted&&adminRows[idx].sap_posted;
    adminRows[idx].status_label=adminRows[idx].completion_status?'완료':'미완료';
  }
  renderResigBody();
}

function alertCard(r,today,urgent) {
  const dday=r.resignation_date?daysBetween(today,r.resignation_date):null;
  const ddayVal = dday!==null?(dday>=0?'-'+dday:'+'+Math.abs(dday)):'-';

const HDR_MAP={'사번':'employee_id','이름':'name','회사명':'company_name','본부':'division','센터':'center','팀':'team','입사일':'hire_date','재직상태':'employment_status','생년월일':'birth_date'};
function parseExcelDate(v){ if(v==null||v==='') return null; if(typeof v==='number'){ const d=XLSX.SSF.parse_date_code(v); if(!d) return null; return `${d.y}-${String(d.m).padStart(2,'0')}-${String(d.d).padStart(2,'0')}`; } if(typeof v==='string'){ const s=v.trim().replace(/\./g,'-').replace(/\//g,'-'); const m=s.match(/^(\d{4})-(\d{1,2})-(\d{1,2})$/); if(m) return `${m[1]}-${m[2].padStart(2,'0')}-${m[3].padStart(2,'0')}`; } return null; }
async function handleUpload() {
  const file=document.getElementById('fileInput').files[0]; if(!file) return;
  const btn=document.getElementById('uploadBtn'), msgBox=document.getElementById('uploadMsg');
  btn.disabled=true; btn.textContent='업로드 중...'; msgBox.classList.add('hidden');
  try {
    const buf=await file.arrayBuffer(); const wb2=XLSX.read(buf,{type:'array'}); const ws=wb2.Sheets[wb2.SheetNames[0]];
    const raw=XLSX.utils.sheet_to_json(ws,{defval:null}); if(!raw.length) throw new Error('데이터 없음');
    const { data: company }=await sbAdmin.from('companies').select('id').eq('code',SUPABASE_CONFIG.companyCode).single(); if(!company) throw new Error('회사 정보 없음');
    const { data: logRow }=await sbAdmin.from('employee_upload_logs').insert({company_id:company.id,uploaded_file_name:file.name,total_count:raw.length,uploaded_by:adminUser?.email||null}).select().single();
    const records=raw.map(row=>{ const m={company_id:company.id,last_upload_id:logRow.id}; for(const[k,v] of Object.entries(row)){ const f=HDR_MAP[k.trim()]; if(!f) continue; if(f==='hire_date'||f==='birth_date') m[f]=parseExcelDate(v); else m[f]=v==null?null:String(v).trim(); } return m; }).filter(r=>r.employee_id&&r.name);
    if(!records.length) throw new Error('유효 레코드 없음');
    const empIds=records.map(r=>r.employee_id);
    const { data: existing }=await sbAdmin.from('employees_master').select('employee_id').eq('company_id',company.id).in('employee_id',empIds);
    const existingSet=new Set((existing||[]).map(e=>e.employee_id));
    const insertedCount=records.filter(r=>!existingSet.has(r.employee_id)).length, updatedCount=records.length-insertedCount;
    for(let i=0;i<records.length;i+=500){ const { error }=await sbAdmin.from('employees_master').upsert(records.slice(i,i+500),{onConflict:'company_id,employee_id'}); if(error) throw error; }
    await sbAdmin.from('employee_upload_logs').update({inserted_count:insertedCount,updated_count:updatedCount}).eq('id',logRow.id);
    msgBox.className='mt-3 text-sm text-accent-green bg-green-50 border border-green-100 rounded-lg px-3 py-2';
    msgBox.textContent=`완료 · 총 ${records.length}건 (신규 ${insertedCount} · 갱신 ${updatedCount})`;
    msgBox.classList.remove('hidden');
    setTimeout(()=>renderUpload(),1500);
  } catch(err) {
    msgBox.className='mt-3 text-sm text-accent-red bg-red-50 border border-red-100 rounded-lg px-3 py-2';
    msgBox.textContent='실패: '+(err.message||'오류'); msgBox.classList.remove('hidden');
  } finally { btn.disabled=false; btn.textContent='📤 업로드 실행'; }
}

function downloadTemplate() {
  const headers = ['사번','이름','회사명','본부','센터','팀','입사일','재직상태','생년월일'];
  const samples = [
    ['10001','홍길동','대웅제약','영업본부','OTC사업센터','약국영업팀','2020-03-01','재직','1990-05-15'],
    ['10002','김영희','대웅제약','마케팅본부','브랜드마케팅센터','제품전략팀','2018-07-15','재직','1988-11-20'],
  ];
  const wb = XLSX.utils.book_new();
  const ws = XLSX.utils.aoa_to_sheet([headers, ...samples]);
  ws['!cols'] = [8,8,8,10,14,10,12,8,12].map(w=>({wch:w}));
  XLSX.utils.book_append_sheet(wb, ws, '직원명부');
  XLSX.writeFile(wb, '직원명부_업로드_템플릿.xlsx');
}

async function renderArchive() {
  const main = document.getElementById('adminMain');
  main.innerHTML = '<div class="p-8 text-ink-500">로딩 중...</div>';

  const { data } = await sbAdmin.from('v_resignation_list').select('*').order('resignation_date',{ascending:false});
  const list = data || [];

  // 연도·분기 맵 구성
  const periodMap = new Map();
  list.forEach(r => {
    if(!r.resignation_date) return;
    const d = new Date(r.resignation_date);
    const y = d.getFullYear(), q = Math.ceil((d.getMonth()+1)/3);
    if(!periodMap.has(y)) periodMap.set(y, new Set());
    periodMap.get(y).add(q);
  });
  const years = Array.from(periodMap.keys()).sort((a,b)=>b-a);
  if(_archiveYear === null && years.length > 0) _archiveYear = years[0];

  // 필터
  const filtered = list.filter(r => {
    if(!r.resignation_date) return false;
    const d = new Date(r.resignation_date);
    if(_archiveYear !== null && d.getFullYear() !== _archiveYear) return false;
    if(_archiveQ > 0 && Math.ceil((d.getMonth()+1)/3) !== _archiveQ) return false;
    return true;
  });
  _archiveData = filtered;

  const total = filtered.length;
  const completed = filtered.filter(r=>r.completion_status).length;
  const avgTenure = total ? Math.round(filtered.reduce((s,r)=>s+(r.tenure_months||0),0)/total) : 0;
  const compRate = total ? Math.round(completed/total*100) : 0;
  const compColor = compRate>=90?'#16A34A':compRate>=60?'#D97706':'#EF4444';

  function yCount(y) { return list.filter(r=>r.resignation_date&&new Date(r.resignation_date).getFullYear()===y).length; }
  function qCount(y,q) { return list.filter(r=>{if(!r.resignation_date)return false;const d=new Date(r.resignation_date);return d.getFullYear()===y&&Math.ceil((d.getMonth()+1)/3)===q;}).length; }

  function navItem(label, count, active, onclick) {
    return `<button onclick="${onclick}" style="width:100%;text-align:left;padding:7px 10px;border:none;border-radius:7px;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:space-between;${active?'background:#EEF2FF;color:#4f46e5;font-weight:700;':'color:#374151;background:transparent;'}">
      <span>${label}</span><span style="font-size:11px;color:#9CA3AF;font-weight:400;">${count}</span>

  const leftNavHtml = years.length === 0
    ? '<div style="font-size:12px;color:#9CA3AF;padding:8px 4px;">데이터 없음</div>'

        const yActive = _archiveYear === y;
        const quarters = [...(periodMap.get(y)||[])].sort();
        return navItem(y+'년', yCount(y), yActive, `_archiveYear=${y};_archiveQ=0;renderArchive();`)
          + (yActive ? quarters.map(q =>
              `<div style="padding-left:10px;">`
              + navItem('Q'+q, qCount(y,q), _archiveQ===q, `_archiveYear=${y};_archiveQ=${q};renderArchive();`)

          </div>
          <button onclick="exportArchive()" style="height:36px;padding:0 16px;background:#fff;border:1px solid #E5E7EB;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;color:#374151;">📥 엑셀 다운로드</button>

function exportArchive() {
  if(!_archiveData.length){ alert('다운로드할 데이터가 없습니다.'); return; }
  const label = (_archiveYear||'전체') + (_archiveQ>0?'_Q'+_archiveQ:'');
  const rows = _archiveData.map(r=>({
    상태: r.completion_status?'완료':'미완료',
    사번: r.employee_id, 이름: r.name,
    회사명: r.company_name, 본부: r.division, 센터: r.center, 팀: r.team,
    퇴사일: formatDate(r.resignation_date), 재직기간: r.tenure_months!=null?r.tenure_months+'개월':'-',
    계정삭제: r.account_deleted?'완료':'미완료',
    사직원: r.resignation_letter_submitted?'완료':'미완료',
    SAP: r.sap_posted?'완료':'미완료',
    등록일: formatDateTime(r.created_at)
  }));
  const ws=XLSX.utils.json_to_sheet(rows); const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,'퇴직자');
  XLSX.writeFile(wb,`퇴직자_보관함_${label}.xlsx`);
}

// ---- 권한 관리 ----
async function renderRoles() {
  const main = document.getElementById('adminMain');
  if(!adminRoles.includes('hr_admin')){ main.innerHTML=`<div class="p-8"><div class="bg-white border border-ink-100 rounded-xl2 p-8 text-center text-sm text-ink-500">hr_admin 권한이 필요합니다.</div></div>`; return; }
  const { data: roles }=await sbAdmin.from('user_roles').select('*').order('granted_at',{ascending:false});
  main.innerHTML=`
    <div class="p-8 max-w-5xl fade-in">
      <div class="mb-7"><h1 class="text-2xl font-semibold text-ink-900">권한 관리</h1></div>
      <div class="bg-white rounded-xl2 border border-ink-100 shadow-soft p-5 mb-6">
        <div class="text-sm font-semibold text-ink-900 mb-4">권한 부여</div>
        <div class="grid md:grid-cols-[1fr_200px_auto] gap-3">
          <input id="newUserId" placeholder="사용자 UUID" class="h-10 px-3 rounded-lg border border-ink-200 text-sm font-mono focus:border-brand outline-none" />
          <select id="newRole" class="h-10 px-3 rounded-lg border border-ink-200 text-sm bg-white focus:border-brand outline-none">
            <option value="hr_viewer">HR Viewer</option>
            <option value="hr_admin">HR Admin</option>
            <option value="company_admin">Company Admin</option>
            <option value="uploader_admin">Uploader</option>
          </select>
          <button onclick="grantRole()" class="h-10 px-4 bg-brand hover:bg-brand-hover text-white rounded-lg text-sm font-medium transition">+ 부여</button>
        </div>
        <div id="roleMsg" class="hidden mt-3"></div>
      </div>
      <div class="bg-white rounded-xl2 border border-ink-100 shadow-soft overflow-hidden">
        <div class="px-5 py-4 border-b border-ink-100 font-semibold text-ink-900">부여된 권한 (${(roles||[]).length})</div>
        <table class="w-full text-sm"><thead class="bg-ink-50 text-ink-600 text-left"><tr class="border-b border-ink-100"><th class="px-5 py-2.5 font-medium">User UUID</th><th class="px-5 py-2.5 font-medium">Role</th><th class="px-5 py-2.5 font-medium">부여일</th><th class="px-5 py-2.5 w-10"></th></tr></thead>
        <tbody>${!roles||roles.length===0?`<tr><td colspan="4" class="px-5 py-8 text-center text-ink-400">없음</td></tr>`:roles.map(r=>`<tr class="border-b border-ink-100"><td class="px-5 py-2.5 font-mono text-xs text-ink-700">${esc(r.user_id)}</td><td class="px-5 py-2.5"><span class="px-2 py-0.5 bg-ink-100 rounded text-xs font-medium">${esc(r.role_name)}</span></td><td class="px-5 py-2.5 tabular-nums text-ink-500">${formatDateTime(r.granted_at)}</td><td class="px-5 py-2.5 text-right"><button onclick="revokeRole('${r.id}')" class="text-ink-400 hover:text-accent-red transition">🗑</button></td></tr>`).join('')}</tbody>
        </table>
      </div>
    </div>`;
}
async function grantRole() {
  const userId=document.getElementById('newUserId').value.trim(), role=document.getElementById('newRole').value, msg=document.getElementById('roleMsg');
  if(!userId){ msg.className='mt-3 text-sm text-accent-red bg-red-50 border border-red-100 rounded-lg px-3 py-2'; msg.textContent='UUID를 입력해주세요.'; msg.classList.remove('hidden'); return; }
  const { error }=await sbAdmin.from('user_roles').insert({user_id:userId,role_name:role,granted_by:adminUser.id});
  if(error){ msg.className='mt-3 text-sm text-accent-red bg-red-50 border border-red-100 rounded-lg px-3 py-2'; msg.textContent=error.message; msg.classList.remove('hidden'); return; }
  renderRoles();
}
async function revokeRole(id) {
  if(!confirm('이 권한을 회수하시겠습니까?')) return;
  const { error }=await sbAdmin.from('user_roles').delete().eq('id',id);
  if(error){ alert(error.message); return; }
  renderRoles();
}

async function openConnModal(row) {
  document.getElementById('connModalTitle').textContent = `${esc(row.name)} 포지션 연결 희망자`;
  document.getElementById('connModalSub').textContent = [row.division, row.center, row.team].filter(Boolean).join(' > ') + ' · 퇴사일 ' + formatDate(row.resignation_date);
  document.getElementById('connModal').classList.remove('hidden');
  document.body.style.overflow = 'hidden';
  const el = document.getElementById('connResults');
  el.innerHTML = `<div class="text-sm text-ink-400 py-4 text-center">조회 중...</div>`;

  // 포지션 찾기 (division+team 기준)
  const { data: positions } = await sbGeo.from('open_positions')
    .select('id')
    .eq('division', row.division || '')
    .eq('team', row.team || '')
    .eq('is_active', true)
    .order('created_at', { ascending: false })
    .limit(5);

  if (!positions || positions.length === 0) {
    el.innerHTML = `<div class="text-center py-10 text-ink-400 text-sm">
      <div style="font-size:32px;margin-bottom:8px;">📭</div>
      아직 거현량 사이트에서 연결 희망한 인원이 없습니다.<br/>
      <span class="text-xs mt-2 block">거현량 사이트에서 해당 포지션이 등록되면 이곳에 표시됩니다.</span>
    </div>`;
    return;
  }

  const posIds = positions.map(p => p.id);
  const { data: conns } = await sbGeo.from('position_connections')
    .select('*')
    .in('position_id', posIds)
    .order('created_at', { ascending: false });

  if (!conns || conns.length === 0) {
    el.innerHTML = `<div class="text-center py-10 text-ink-400 text-sm">
      <div style="font-size:32px;margin-bottom:8px;">📭</div>
      아직 연결 희망자가 없습니다.
    </div>`;
    return;
  }

  el.innerHTML = `
    <div class="text-xs text-ink-500 mb-3">총 ${conns.length}명이 연결을 희망했습니다.</div>
    ${conns.map(c => `
      <div style="border:1.5px solid #E8EAF6;border-radius:12px;padding:16px;background:#fff;margin-bottom:8px;">
        <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px;">
          <div style="flex:1;min-width:0;">
            <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:4px;">
              <span style="font-size:15px;font-weight:800;color:#1e1b4b;">${esc(c.expert_name || '이름 미제공')}</span>
              <span style="font-size:11px;background:#EEF2FF;color:#4f46e5;padding:2px 8px;border-radius:20px;font-weight:700;">연결 희망</span>
            </div>
            <div style="font-size:12px;color:#6B7280;">${esc(c.expert_org || '')}${c.expert_title ? ' · ' + esc(c.expert_title) : ''}</div>
            ${c.expert_summary ? `<div style="margin-top:8px;font-size:13px;color:#374151;line-height:1.6;padding:10px;background:#F8FAFF;border-radius:8px;">${esc(c.expert_summary)}</div>` : ''}
            ${c.message ? `<div style="margin-top:6px;font-size:12px;color:#6366f1;font-style:italic;">"${esc(c.message)}"</div>` : ''}
          </div>
          <div style="text-right;flex-shrink:0;">
            <div style="font-size:11px;color:#94A3B8;">${formatDate(c.created_at)}</div>
            <select onchange="updateConnStatus('${c.id}', this.value)" style="margin-top:6px;font-size:11px;border:1px solid #E5E7EB;border-radius:6px;padding:3px 6px;color:#374151;">
              <option value="pending" ${c.status==='pending'?'selected':''}>검토중</option>
              <option value="accepted" ${c.status==='accepted'?'selected':''}>수락</option>
              <option value="rejected" ${c.status==='rejected'?'selected':''}>거절</option>
            </select>
          </div>
        </div>
      </div>
    `).join('')}
  `;
}

async function updateConnStatus(id, status) {
  await sbGeo.from('position_connections').update({ status }).eq('id', id);
}

function closeConnModal() {
  document.getElementById('connModal').classList.add('hidden');
  document.body.style.overflow = '';
}

let _recoRow = null;

function openRecoModal(id) {
  _recoRow = adminRows.find(r => r.id === id);
  if (!_recoRow) return;
  document.getElementById('recoModalTitle').textContent = `${esc(_recoRow.name)} 후임 인재 추천`;
  document.getElementById('recoModalSub').textContent = [_recoRow.division, _recoRow.center, _recoRow.team].filter(Boolean).map(esc).join(' · ') + ' · 퇴사일 ' + formatDate(_recoRow.resignation_date);
  document.getElementById('recoKeywordInput').value = [_recoRow.division, _recoRow.center, _recoRow.team].filter(Boolean).join(' ');
  document.getElementById('recoModal').classList.remove('hidden');
  document.body.style.overflow = 'hidden';
  runRecoSearch();
}
function closeRecoModal() {
  document.getElementById('recoModal').classList.add('hidden');
  document.body.style.overflow = '';
  _recoRow = null;
}
document.getElementById('recoModal').addEventListener('click', function(e){ if(e.target===this) closeRecoModal(); });

function geoTokenize(text) {
  if (!text) return [];
  return [...new Set(text.replace(/[^\w가-힣\s]/g,' ').split(/\s+/).map(t=>t.trim()).filter(t=>t.length>=2))];
}

async function runRecoSearch() {
  if (!sbGeo) return;
  const el = document.getElementById('recoResults');
  el.innerHTML = `<div class="flex items-center justify-center py-10"><div class="w-5 h-5 rounded-full border-2 border-ink-200 border-t-brand animate-spin mr-3"></div><span class="text-sm text-ink-500">매칭 중...</span></div>`;
  const keywords = geoTokenize(document.getElementById('recoKeywordInput').value.trim());
  const { data: experts, error } = await sbGeo.from('geo_experts').select('id,name,org,title,expertise,key_competencies,career,keywords,recruitable,recruit_note').limit(500);
  if (error) { el.innerHTML=`<div class="py-8 text-center text-sm text-accent-red">조회 오류: ${esc(error.message)}</div>`; return; }
  if (!experts?.length) { el.innerHTML=`<div class="py-8 text-center text-sm text-ink-400">거현량에 등록된 전문가가 없습니다.</div>`; return; }
  const scored = experts.map(ex => {
    let score=0; const matchedKw=[];
    const kwArr=Array.isArray(ex.keywords)?ex.keywords:(ex.keywords?String(ex.keywords).split(','):[]);
    const fields=[ex.expertise,ex.key_competencies,ex.career,ex.org,ex.title,kwArr.join(' ')].filter(Boolean).join(' ').toLowerCase();
    keywords.forEach(k=>{ if(fields.includes(k.toLowerCase())){ score+=10; matchedKw.push(k); } });
    if(ex.recruitable) score+=8;
    const reasons=[];
    if(matchedKw.length) reasons.push(`"${matchedKw.slice(0,3).join('", "')}" 키워드 일치`);
    if(ex.recruitable) reasons.push('채용 가능 Pool');
    return { ex, score, reasons: reasons.join(' · ')||'관련 분야 전문가' };
  }).filter(x=>x.score>0).sort((a,b)=>b.score-a.score).slice(0,8);
  if(!scored.length) { el.innerHTML=`<div class="py-8 text-center"><div class="text-sm text-ink-500 mb-1">매칭되는 전문가가 없습니다.</div><div class="text-xs text-ink-400">직무·역량 등 구체적 키워드로 재검색해 보세요.</div></div>`; return; }
  el.innerHTML = `
    <div class="text-xs text-ink-500 mb-3">총 ${scored.length}명 매칭</div>
    ${scored.map(({ex,score,reasons})=>`
      <div class="border border-ink-100 rounded-xl p-4 bg-white hover:border-brand/30 hover:shadow-soft transition">
        <div class="flex items-start justify-between gap-3">
          <div class="min-w-0">
            <div class="flex items-center gap-2 flex-wrap">
              <span class="font-semibold text-ink-900">${esc(ex.name)}</span>
              ${ex.recruitable?'<span class="px-1.5 py-0.5 bg-green-50 text-accent-green border border-green-100 rounded text-[10px] font-semibold">채용Pool</span>':''}
            </div>
            <div class="mt-0.5 text-xs text-ink-500">${esc(ex.org||'')}${ex.title?' · '+esc(ex.title):''}</div>
          </div>
          <div class="shrink-0 text-right">
            <div class="text-xl font-bold text-brand tabular-nums">${score}</div>
            <div class="text-[10px] text-ink-400">점</div>
          </div>
        </div>
        ${ex.expertise?`<div class="mt-2 text-xs text-ink-600 leading-relaxed">${esc(ex.expertise)}</div>`:''}
        <div class="mt-2 text-[11px] text-brand font-medium">💡 ${esc(reasons)}</div>
        ${ex.recruit_note?`<div class="mt-1.5 text-[11px] text-ink-500 bg-ink-50 rounded px-2 py-1">📝 ${esc(ex.recruit_note)}</div>`:''}
      </div>`).join('')}`;
}
