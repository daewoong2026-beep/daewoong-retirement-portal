      auth: { persistSession: false, autoRefreshToken: false, detectSessionInUrl: false }

  : sb;
const sbGeo  = sb ? supabase.createClient(SUPABASE_CONFIG.url, SUPABASE_CONFIG.anonKey) : null; // public 스키마 (거현량)

let adminRows   = [];     // 퇴직자 목록 캐시

(async function init() {
  root.innerHTML = `<div class="min-h-screen flex items-center justify-center"><div class="w-8 h-8 rounded-full border-2 border-ink-200 border-t-brand animate-spin"></div></div>`;

  if (!sb) { renderLogin(); return; }

  // 관리자 세션 체크
  const { data: { session } } = await sb.auth.getSession();
  if (session) {
    adminUser = session.user;
    await loadAdminRoles();
    if (adminRoles.length > 0) { appMode = 'admin'; renderAdminApp(); return; }
  }

  // 직원 세션 체크
  const emp = getEmpIdentity();
  if (emp) { appMode = 'employee'; routeEmployee(); return; }

  renderLogin();
})();

// ============================================================
// 공통 유틸
// ============================================================
function getEmpIdentity() {
  try {
    const d = JSON.parse(sessionStorage.getItem('emp_identity') || 'null');
    if (!d) return null;
    if (Date.now() - d.ts > 30 * 60 * 1000) { sessionStorage.removeItem('emp_identity'); return null; }
    return d;
  } catch { return null; }
}
function setEmpIdentity(employee_id, name) {
  sessionStorage.setItem('emp_identity', JSON.stringify({ employee_id, name, ts: Date.now() }));
}
function clearEmpIdentity() { sessionStorage.removeItem('emp_identity'); }

async function loadAdminRoles() {
  const { data } = await sbAdmin.from('user_roles').select('role_name').eq('user_id', adminUser.id);
  adminRoles = (data || []).map(r => r.role_name);
}

async function logout() {
  await sb.auth.signOut();
  adminUser = null; adminRoles = []; appMode = null;
  clearEmpIdentity();
  renderLogin();
}

function bindSmartLogin() {
  const field1   = document.getElementById('field1');
  const field2   = document.getElementById('field2');
  const f2Label  = document.getElementById('f2Label');
  const f2Hint   = document.getElementById('f2Hint');
  const badge    = document.getElementById('dwBadge');

  // 숫자만 → 직원, 그 외 → 관리자
  function isAdmin() { return field1.value.trim() !== '' && !/^\d+$/.test(field1.value.trim()); }

  function updateMode() {
    if (isAdmin()) {
      f2Label.textContent = '비밀번호';
      field2.type = 'password';
      field2.placeholder = '비밀번호를 입력해 주세요.';
      f2Hint.textContent = '관리자(HR 담당자) 계정으로 로그인합니다.';
      badge.innerHTML = '<span class="dot"></span>관리자 로그인';
      badge.className = 'lg-badge admin';
    } else {
      f2Label.textContent = '이름';
      field2.type = 'text';
      field2.placeholder = '홍길동';
      f2Hint.textContent = '직원명부에 등록된 이름을 입력해 주세요.';
      badge.innerHTML = '<span class="dot"></span>직원 로그인';
      badge.className = 'lg-badge emp';
    }
  }

  field1.addEventListener('input', updateMode);

  document.getElementById('smartLoginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const err = document.getElementById('loginErr');
    const btn = document.getElementById('loginBtn');
    err.classList.remove('on');
    btn.disabled = true; btn.textContent = '확인 중...';

    const v1 = field1.value.trim();
    const v2 = field2.value.trim();

    try {
      if (isAdmin()) {
        // 관리자: 아이디에 @ 없으면 @daewoong.co.kr 자동 보완
        const email = v1.includes('@') ? v1 : v1 + '@daewoong.co.kr';
        const { data, error } = await sb.auth.signInWithPassword({ email, password: v2 });
        if (error) throw new Error('아이디 또는 비밀번호가 올바르지 않습니다.');
        adminUser = data.user;
        await loadAdminRoles();
        if (adminRoles.length === 0) {
          await sb.auth.signOut();
          throw new Error('로그인은 성공했지만 접근 권한이 없습니다. HR 관리자에게 문의하세요.');
        }
        appMode = 'admin';
        renderAdminApp();
      } else {
        // 직원: 사번 + 이름 RPC
        const { data, error } = await sb.rpc('check_employee_identity', {
          p_employee_id: v1,
          p_name: v2,
        });
        if (error) throw error;
        if (!data) throw new Error('사번과 이름이 일치하지 않습니다.');
        setEmpIdentity(v1, v2);
        appMode = 'employee';
        renderPortal();
      }
    } catch (e2) {
      document.getElementById('loginErr').textContent = e2.message || '오류가 발생했습니다. 잠시 후 다시 시도해 주세요.';
      document.getElementById('loginErr').classList.add('on');
    } finally {
      btn.disabled = false; btn.textContent = '로그인';
    }
  });
}

// ---- 대시보드 ----
// ── AI 인사이트 분석기 ──────────────────────────────────
function generateInsights(list, Y, M) {
  const insights = [];
  const thisMonth = list.filter(r => { if (!r.resignation_date) return false; const d = new Date(r.resignation_date); return d.getFullYear()===Y && d.getMonth()===M; }).length;
  const lastMonth = list.filter(r => { if (!r.resignation_date) return false; const d = new Date(r.resignation_date); const lm = new Date(Y, M-1, 1); return d.getFullYear()===lm.getFullYear() && d.getMonth()===lm.getMonth(); }).length;
  const d5 = list.filter(r => r.is_d5_warning).length;
  const incomplete = list.filter(r => !r.completion_status).length;
  const tenures = list.map(r => r.tenure_months).filter(v => v != null);
  const avgTenure = tenures.length ? Math.round(tenures.reduce((a,b)=>a+b,0)/tenures.length) : 0;
  const shortTenure = tenures.filter(t => t < 24).length;
  const divMap = new Map(); list.forEach(r => { const k = r.division||'미지정'; divMap.set(k,(divMap.get(k)||0)+1); });
  const topDiv = Array.from(divMap.entries()).sort((a,b)=>b[1]-a[1])[0];

  if (thisMonth > 0 && lastMonth > 0) {
    const chg = Math.round((thisMonth - lastMonth) / lastMonth * 100);
    if (chg > 20) insights.push({ level:'warn', icon:'📈', text:`이번 달 퇴직자(${thisMonth}명)가 전월 대비 ${chg}% 급증했습니다. 주요 원인 파악이 필요합니다.` });
    else if (chg < -20) insights.push({ level:'good', icon:'📉', text:`이번 달 퇴직자(${thisMonth}명)가 전월 대비 ${Math.abs(chg)}% 감소했습니다. 안정적인 흐름입니다.` });
    else insights.push({ level:'info', icon:'📊', text:`이번 달 퇴직자는 ${thisMonth}명으로 전월(${lastMonth}명) 대비 유사한 수준입니다.` });
  } else if (thisMonth > 0) {
    insights.push({ level:'info', icon:'📊', text:`이번 달 ${thisMonth}명의 퇴직이 접수되었습니다.` });
  }

  if (d5 > 0) insights.push({ level:'urgent', icon:'🚨', text:`D-5 경고 ${d5}건이 있습니다 — 5일 이내 처리 필요 업무를 즉시 확인하세요.` });
  if (incomplete > 3) insights.push({ level:'warn', icon:'⚠️', text:`미완료 처리 건수가 ${incomplete}건입니다. 인사 처리 지연이 발생할 수 있습니다.` });

  if (topDiv && topDiv[1] > 0) {
    const pct = Math.round(topDiv[1] / list.length * 100);
    insights.push({ level:'info', icon:'🏢', text:`${topDiv[0]}이 전체 퇴직자의 ${pct}%(${topDiv[1]}명)로 가장 높습니다. 해당 본부의 retention 전략 점검을 권장합니다.` });
  }

  if (avgTenure > 0 && avgTenure < 24) insights.push({ level:'warn', icon:'⏱️', text:`평균 재직기간이 ${avgTenure}개월(${(avgTenure/12).toFixed(1)}년)로 짧습니다. 온보딩·조기 이탈 방지 프로그램 검토가 필요합니다.` });
  else if (avgTenure >= 60) insights.push({ level:'good', icon:'✅', text:`평균 재직기간 ${avgTenure}개월(${(avgTenure/12).toFixed(1)}년)로 장기 근속 비율이 높은 편입니다.` });

  if (shortTenure > 0 && tenures.length > 0 && shortTenure / tenures.length > 0.3) {
    insights.push({ level:'warn', icon:'🔍', text:`2년 미만 단기 퇴직자가 ${shortTenure}명(${Math.round(shortTenure/tenures.length*100)}%)으로 높습니다. 채용 프로세스 및 직무 적합도 검토를 권장합니다.` });
  }

  if (insights.length === 0) insights.push({ level:'good', icon:'✅', text:'현재 특이 사항이 없습니다. 전반적으로 안정적인 인사 지표를 유지하고 있습니다.' });
  return insights;
}

  const { data } = await sbAdmin.from('v_resignation_list').select('*').order('resignation_date',{ascending:false}).limit(2000);
  const list = data || [];
  const now = new Date(); const Y = now.getFullYear(); const M = now.getMonth();
  const total = list.length;
  const thisYear  = list.filter(r => r.resignation_date && new Date(r.resignation_date).getFullYear()===Y).length;
  const thisMonth = list.filter(r => { if (!r.resignation_date) return false; const d=new Date(r.resignation_date); return d.getFullYear()===Y&&d.getMonth()===M; }).length;
  const lastMonth = list.filter(r => { if (!r.resignation_date) return false; const d=new Date(r.resignation_date); const lm=new Date(Y,M-1,1); return d.getFullYear()===lm.getFullYear()&&d.getMonth()===lm.getMonth(); }).length;
  const incomplete = list.filter(r => !r.completion_status).length;
  const d5 = list.filter(r => r.is_d5_warning).length;
  const sapTodo = list.filter(r => !r.sap_posted).length;

const HDR_MAP={'사번':'employee_id','이름':'name','회사명':'company_name','본부':'division','센터':'center','팀':'team','입사일':'hire_date','재직상태':'employment_status','생년월일':'birth_date'};
function parseExcelDate(v){ if(v==null||v==='') return null; if(typeof v==='number'){ const d=XLSX.SSF.parse_date_code(v); if(!d) return null; return `${d.y}-${String(d.m).padStart(2,'0')}-${String(d.d).padStart(2,'0')}`; } if(typeof v==='string'){ const s=v.trim().replace(/\./g,'-').replace(/\//g,'-'); const m=s.match(/^(\d{4})-(\d{1,2})-(\d{1,2})$/); if(m) return `${m[1]}-${m[2].padStart(2,'0')}-${m[3].padStart(2,'0')}`; } return null; }
async function handleUpload() {
  const file=document.getElementById('fileInput').files[0]; if(!file) return;
  const btn=document.getElementById('uploadBtn'), msgBox=document.getElementById('uploadMsg');
  btn.disabled=true; btn.textContent='업로드 중...'; msgBox.classList.add('hidden');
  try {
    const buf=await file.arrayBuffer(); const wb2=XLSX.read(buf,{type:'array'}); const ws=wb2.Sheets[wb2.SheetNames[0]];
    const raw=XLSX.utils.sheet_to_json(ws,{defval:null}); if(!raw.length) throw new Error('데이터 없음');
    const { data: company }=await sbAdmin.from('companies').select('id').eq('code',SUPABASE_CONFIG.companyCode).single(); if(!company) throw new Error('회사 정보 없음');
    const { data: logRow }=await sbAdmin.from('employee_upload_logs').insert({company_id:company.id,uploaded_file_name:file.name,total_count:raw.length}).select().single();
    const records=raw.map(row=>{ const m={company_id:company.id,last_upload_id:logRow.id}; for(const[k,v] of Object.entries(row)){ const f=HDR_MAP[k.trim()]; if(!f) continue; if(f==='hire_date'||f==='birth_date') m[f]=parseExcelDate(v); else m[f]=v==null?null:String(v).trim(); } return m; }).filter(r=>r.employee_id&&r.name);
    if(!records.length) throw new Error('유효 레코드 없음');
    const empIds=records.map(r=>r.employee_id);
    const { data: existing }=await sbAdmin.from('employees_master').select('employee_id').eq('company_id',company.id).in('employee_id',empIds);
    const existingSet=new Set((existing||[]).map(e=>e.employee_id));
    const insertedCount=records.filter(r=>!existingSet.has(r.employee_id)).length, updatedCount=records.length-insertedCount;
    for(let i=0;i<records.length;i+=500){ const { error }=await sbAdmin.from('employees_master').upsert(records.slice(i,i+500),{onConflict:'company_id,employee_id'}); if(error) throw error; }
    await sbAdmin.from('employee_upload_logs').update({inserted_count:insertedCount,updated_count:updatedCount}).eq('id',logRow.id);
    msgBox.className='mt-3 text-sm text-accent-green bg-green-50 border border-green-100 rounded-lg px-3 py-2';
    msgBox.textContent=`완료 · 총 ${records.length}건 (신규 ${insertedCount} · 갱신 ${updatedCount})`;
    msgBox.classList.remove('hidden');
    setTimeout(()=>renderUpload(),1500);
  } catch(err) {
    msgBox.className='mt-3 text-sm text-accent-red bg-red-50 border border-red-100 rounded-lg px-3 py-2';
    msgBox.textContent='실패: '+(err.message||'오류'); msgBox.classList.remove('hidden');
  } finally { btn.disabled=false; btn.textContent='📤 업로드 실행'; }
}

function geoTokenize(text) {
  if (!text) return [];
  return [...new Set(text.replace(/[^\w가-힣\s]/g,' ').split(/\s+/).map(t=>t.trim()).filter(t=>t.length>=2))];
}

        ${ex.expertise?`<div class="mt-2 text-xs text-ink-600 leading-relaxed">${esc(ex.expertise)}</div>`:''}
        <div class="mt-2 text-[11px] text-brand font-medium">💡 ${esc(reasons)}</div>
        ${ex.recruit_note?`<div class="mt-1.5 text-[11px] text-ink-500 bg-ink-50 rounded px-2 py-1">📝 ${esc(ex.recruit_note)}</div>`:''}
      </div>`).join('')}`;
}
</script>
</body>
</html>
